許否答云可爾有垂示法語仍舉落髮偈云毀形守志節割愛辭所親出家弘聖道誓度一切人三舉大眾同聲和沙彌就禮三拜仍胡跪合掌本師持袈裟亦有垂示法語付袈裟置沙彌頂上復舉偈云大哉解脫服無相福田衣披奉如來戒廣度諸眾生三舉眾亦同聲和畢沙彌披袈裟禮本師三拜禮聖僧三拜禮戒師三拜胡跪合掌戒師云善男子法如大海漸入漸深汝既出家當先受三歸五戒方得近事大僧次受沙彌十戒乃可同僧利養事在專誠不得慢易我今為汝召請三寶證明佛事秉爐云一心奉請無邊佛寶海藏經文十地三賢五果四向同垂感降共作證明三請訖乃云善男子欲求歸戒先當懺滌愆瑕如人浣衣然後加色汝今至誠隨我懺悔舉云我昔所造諸惡業皆由無始貪嗔癡從身口意之所生一切我今皆懺悔三舉眾三和沙彌三拜胡跪合掌戒師云善男子法既淨治身口意業今當歸依佛法僧寶乃舉唱云歸依佛歸依法歸依僧歸依佛無上尊歸依法離欲尊歸依僧眾中尊歸依佛竟歸依法竟歸依僧竟如來至真等正覺是我大師我今歸依從今以往稱佛為師更不歸依邪魔外道慈愍故沙彌隨聲念眾皆和自歸依佛起至慈愍故通誦三遍如慈愍故次則再疊之三則三疊之每誦一遍沙彌隨禮一拜二遍二拜三遍三拜就胡跪合掌戒師云善男子汝既捨邪歸正戒已周圓若欲識相護持應受五戒不殺生不偷盜盡形壽不婬欲是五戒相汝能持不答云能持不妄語不飲酒上來五支淨戒一一不得犯汝能持不答云能持是事如是持沙彌三拜胡跪合掌戒師云善男子五戒為入道之初因出三途之元首次受沙彌十戒形備法儀此稱勤策依師而住受利同僧是為應法沙彌應當頂受不殺生不偷盜不婬欲不妄語不飲酒盡壽是沙彌戒相汝能持不答云能持不坐臥高廣大床不花鬘瓔珞香油塗身不歌舞作倡故往觀聽不捉金銀錢寶不非時食上來十支淨戒一一不得犯汝能持不答云能持是事如是持沙彌三拜胡跪合掌善男子汝今受戒之後當須頂戴奉持不得違犯所持戒律供養三寶勤種福田於和尚阿闍梨一如法教於上中下座心常恭敬精進行道報父母恩衣取蔽形不以文彩食取支命不得嗜味花香脂粉無以近身好色邪聲一無視聽徐言持正勿宣人短倘有爭者兩說和合男女有別草木無傷非賢不友非聖不宗法服應器常與人俱非時不食非法不言精勤思義溫故知新坐則禪思起則諷誦閉三惡道開涅槃門於比丘法中增長正業菩提心而不退般若智以長明廣化眾生祈成正覺用心如此真佛弟子沙彌禮三拜胡跪合掌戒師起身秉爐回向云上來剃頭受戒功德奉祝護法天龍伽藍真宰各展威靈安僧護法堂頭和尚常為苦海之津梁執事高人永作法門之柱石合堂清眾同乘般若之舟剃頭沙彌共至菩提之岸四恩總報三有齊資法界有情同圓種智十方三世一切諸佛諸尊菩薩摩訶薩摩訶般若波羅蜜戒師仍就坐作梵闍梨鳴磬云處世界如虛空如蓮花不著水心清淨超於彼稽首禮無上尊佛得菩提道心常不退歸依法薩般若得大總持門僧息諍論同入和合海上來剃頭受戒功德無限殊勝良因散周沙界和南聖眾引請闍梨候作梵闍梨舉處世界如虛空時即鳴手磬引沙彌禮戒師三拜轉身禮聖僧三拜畢問訊出堂外下手立戒師二闍梨聖僧前大展三拜而出堂司行者鳴堂前鍾三下住持出堂大眾下床首座領眾隨詣方丈禮賀如眾多住持當就法堂上受賀客頭行者仍預排列香燭爐瓶罘罳椅子伺候先戒師二闍梨行禮初展云蒙差授戒勉強祇承人事荒疎有淹尊重下情不勝惶恐之至住持答云沙彌剃頭有勞神用再展敘寒溫畢觸禮三拜住持答一拜次首座大眾進前插香或展或觸禮或免次侍者小師插香大展三拜不收坐具進云沙彌得度舉眾同歡仰對尊嚴下情不勝欣躍之至又三拜進敘寒溫退三拜收坐具次沙彌插香大展三拜不收坐具進云某等叨圓頂相幸掛田衣不受塵勞永離愛網下情不勝欣感之至又三拜進云即日時令謹時恭惟堂頭本師大和尚尊候起居多福退三拜收坐具住持巡寮報禮沙彌一一詣寮禮謝秖就沙彌寮安下俟他時登壇受戒謝戒詞云某等獲登戒品濫廁僧倫仰荷庇庥特此拜謝答云宿承佛記僧戒圓成堅忍受持力扶宗教新戒參堂得度受沙彌戒已覆住持於何日參堂次稟首座維那至期早粥遍食椎後新戒參頭領眾入堂聖僧前列問訊插香大展三拜不收坐具進云某等獲廁僧倫攀附清眾此日參堂下情不勝戰汗之至又三拜進云即日時令謹時恭惟堂頭本師大和尚首座尊眾大禪師尊候起居多福退三拜收坐具轉身住持前列問訊從首座板起巡堂至外堂復歸內堂中間問訊而出然後歸堂插單隨眾禪誦登壇受戒三世諸佛皆曰出家成道歷代祖師傳佛心印盡是沙門蓋以嚴淨毘尼方能弘範三界然則參禪問道戒律為先若不離過防非何以成佛作祖受戒之法應備三衣鉢具并新淨衣物如無新者浣染令淨入壇受戒一心專注慎勿異緣像佛形儀具佛戒律得佛受用此非小事豈可輕心若徣借衣鉢雖登壇受戒並不得戒若不曾受一生為無戒之人濫廁空門虛消信施既受聲聞戒應受菩薩戒此入法之漸也護戒受戒之後常應守護寧有法死不無法生如小乘四分律云四波羅夷十三僧伽婆尸沙二不定三十尼薩耆九十波逸提四波羅提提舍尼一百眾學七滅諍大乘梵網經十重四十八輕並須讀誦通利善知持犯開遮但依金口聖言莫擅隨於庸輩如不應食謂酒葷腥也葱韭蒜薤園荽曰葷諸肉味曰腥並不應食不非時食如非粥飯二時皆非時食並宜服禁財色之禍甚於毒蛇尤當遠離慈念眾生猶如赤子語言真實心口相應讀誦大乘資發行願尸羅清淨佛法現前皮之不存毛將安付故經云精進持淨戒猶如護明珠辦道具將入叢林先辦道具中阿含經云所蓄物可資身者即是增長善法之具菩薩戒經云資生順道之具三衣蓋法衣有三也一僧伽黎即大衣也二欝多羅僧即七條也三安陀會即五條也此是三衣也若呼七條偏衫裙為三衣者非也又三品大衣上品二十五條二十三條二十一條中品十九條十七條十五條下品十三條十一條九條田衣緣起僧祇律云佛住帝釋石窟前見稻田畦畔分明語阿難云過去諸佛衣相如是從今依此作衣相增輝記云田畦貯水生長嘉苗以養形命法衣之田潤以四利之水增其三善之苗以養身法慧命也坐具梵云尼師壇此云隨坐衣根本毘柰耶云尼師但那唐言坐具五分律云為護身護衣護僧床褥故蓄坐具僧祇云律應量作長佛二磔手廣一磔手半佛一磔手長二尺四寸此合長四尺八寸廣三尺六寸偏衫古僧衣律制只有僧祇支此云覆膊衣亦名掩腋衣此長覆左膊及右腋蓋𮍊三衣故即天竺之儀也竺道祖魏錄云魏宮人見僧袒一肘不以為善乃作偏袒縫於僧祇支上相從因名偏衫今開脊接領者是蓋魏遺制也裙西域記云泥縛些羅些桑箇切唐言裙諸律舊譯或云涅槃僧或云泥洹僧或譯為內衣或云圌衣圌音船即貯米圓器似圌而無蓋取圓儀故云直裰相傳前輩見僧有偏衫而無裙有裙而無偏衫遂合二衣為直裰然普化索木直裰大陽傳革履布裰古亦有矣鉢梵云鉢多羅此云應量器今略云鉢又呼云鉢盂即華梵兼名佛本行集經云北天竺有二商主一名帝利富婆二名跋利迦奉世尊酪密揣世尊思惟往昔諸佛悉皆受持鉢器我今當以何器受商主食時四天王疾共持四金鉢奉上世尊不受以出家人不合蓄此彼四天王更將四銀鉢玻𭹳鉢瑠璃鉢赤珠鉢瑪瑙鉢𤥭璖鉢奉上悉皆不受時北方毘沙門天王告三天王言我念往昔青色諸天將四石器來奉我等可用受食時別有一天子名毘盧遮那白言仁等慎勿於此石器受食但供養如來當有如來號釋迦牟尼出世宜將此四石鉢奉彼如來時四天王共將四石鉢奉佛世尊念四天王以信淨心奉我四鉢若我於一人邊受餘各有恨我今總受四鉢持作一鉢次第相重安置左手右手按下合成一鉢外有四唇而說偈言我昔功德諸果滿以發哀愍清淨心是故今四大天王清淨牢固施我鉢錫杖梵云隙棄羅此云錫杖錫杖經云佛告比丘應受持錫杖過去未來現在諸佛皆執故又名智杖又名德杖彰顯智行功德本故迦葉白佛何名錫杖佛言錫者輕也依倚是杖除煩惱出三界故錫明也得智明故錫醒也醒悟苦空三界結究故錫疏也謂持者與五欲疏斷故二股六環是迦葉佛製四股十二環是釋迦佛製主杖十誦律云佛聽蓄杖其𥎞用鐵為堅牢故斯蓋行李之善助也又毘奈耶云佛聽蓄主丈有二因緣一為老瘦無力二為病苦嬰身故拂子律云比丘患草蟲聽作拂子僧祇云佛聽作線拂列㲲拂芒拂樹皮拂若描牛尾馬尾并金銀裝柄者皆不可執數珠牟尼曼陀羅經云梵語鉢塞莫梁云數珠系念修業之具也木槵子經云昔有國王名波流黎白佛言我國邊小我常不安法藏深廣不得遍行願示法要佛言若欲滅煩惱當貫木槵子一百八箇常自隨身志心稱南無佛陀南無達摩南無僧伽名乃過一子如是漸次乃過至千萬能滿二十萬遍身心不亂捨命得生炎摩天若滿百萬遍當除百八結業獲常樂果王言我當奉行淨瓶梵語捃雉迦此云瓶常貯水隨身以用淨手寄歸傳云軍遲有二若瓦者是淨用若銅鐵者是觸用濾水囊增輝記云為器雖小其功甚大為護生命故中華僧鮮有受持准律標示根本百一羯磨云水羅有五種一方羅用絹三尺或二尺隨時大小作絹須細密不透虫者若用踈絹薄紗紵布者無護生之意二法瓶陰陽瓶也三軍遲以絹繫口以繩懸沈於水待滿引出四酌水羅五衣角羅言衣角者非袈裟角也但取密絹一方磔手或繫瓶口或安鉢盂中濾水用也慈覺大師𦣱公集經律凡三十一偈文多不錄末謂世云濾羅難安多眾宗賾崇寧元年於洪濟院厨前井邊安大水檻上近檻唇別安小檻穿角傍出下安濾羅傾水之時全無迸溢亦五大眾沾足浴院後架倣此僧行東司亦皆濾水出家之本道也後住長蘆諸井濾水二十餘處常住若不濾水罪歸主執之人普冀勉而行之戒刀僧史略云戒刀皆是道具表斷一切惡故裝包古者戴笠笠內安經文茶具之類衣被束前後包插祠部筒戒刀今則頂包裝包之法用青布袱二條先以一條收拾衣被之屬仍用油單裹於外復用一條重包於外四角結定用小鎖鎖之仍繫包鈎於上度牒有袋懸胸前袈裟以帕子縛定入腰包繫於前下裳鞋襪有袋繫於後右手携主杖途中雲水相逢彼此叉手朝揖而過如遊山到處將及門下包捧入旦過安歇處解包取鞋襪濯足更衣搭袈裟與知客相看遊方參請稟辭師長慕有道尊宿處依棲求掛搭准律云比丘有法有食處應住有法無食處亦應住無法有食處不應住古規首到客司相看次往堂司掛搭送單位經案定然後到侍司通覆詣方丈禮拜今時遊方掛搭初到旦過推熟於叢林能事者一人為參頭領眾至客司具威儀列門首右白云暫到相看知客即接入詞云即日恭惟知賓尊長禪師尊候起居多福久欽此譽復奉瞻際下情不勝感激之至答云山門多幸特荷遠臨揖坐燒香喫茶略詢來歷即起謝茶歸旦過知客尋往回禮參頭接入普同問訊知客詞云移刻恭惟諸位尊長禪師尊候起居多福適承降重特此拜謝下情不勝感激之至答云禮合拜看何勤降重參頭自送出門若欲禮拜住持則放參後詣侍司相看如前禮起身稟云某等特來禮拜和尚敢勞侍者通覆侍者揖再坐詳詢來由或鄉人法眷辦事分明侍者云且回安下處容某通覆即上方丈咨覆如允次早鍾鳴侍者令客頭報相看如未暇侍者挑燈詣安下處報禮善言安慰相看之禮粥罷參頭領眾詣寢堂候住持出侍者接入參頭進前云請和尚趺坐轉身左手插香退身同眾初展云某等久聞道風此日獲奉尊顏下情不勝喜躍之至再展云即日時令謹時恭惟堂頭大和尚尊候起居多福觸禮三拜如入室弟子法眷則云久承慈廕別插香行禮就座侍者燒香喫茶住持問鄉里名諱及夏在何處各須實答不可多語起身爐前謝云重承降接特此拜謝住持送出參頭云和尚尊重隨至侍司致謝云有煩神用特此拜謝歸旦過外下手排立候住持回禮同問訊接入詞云移刻恭惟堂頭大和尚尊候起居多福某等適來分合禮拜過蒙降重下情不勝感激之至住持云安下不便幸望款留眾送出參頭轉上手接侍者入同眾問訊云移刻恭惟高侍禪師道體起居多福禮合詣寮拜看返辱降重下情不勝感激之至侍者云山門多幸特荷遠臨報謝稽遲下情多愧今遊方者多不入旦過到處輒尋鄉曲頭首寮舍安泊古禮漸至無聞住持遇名勝相看就送客位回禮上座相看就法堂下間迎伺住持回禮免煩降重而五山大方則不回禮半齋請點心當晚特為湯披衣赴住持接入爐前通寒溫就坐侍者燒香揖湯湯罷起就爐前謝湯須兩展三禮抽衣就坐藥石如住持不暇請頭首代相陪時當自起燒香住持自伴湯乃盡禮也次日粥罷請茶參頭領眾排立寢堂前候住持至即趨前問訊云經宿恭惟堂頭和尚尊候起居多福某等重承寵呼下情不勝感激之至入座侍者燒香喫茶起至爐前兩展三禮謝茶初展云某等重承煎點特此拜謝下情不勝感激之至再展云即日時令謹時恭惟堂頭和尚尊候起居多福退身觸禮三拜住持送出兩三步如求掛搭參頭領眾回身進住持前稟云某等生死事大無常迅速久聞道風特來依附伏望慈悲收錄稟訖不伺允否即普觸禮一拜云謝和尚掛搭當先掛搭參頭其餘不拘早晚不擇處所各知進退伺候住持求住方丈近事人母得呵禁如允仍觸禮一拜就求帖子到侍司附名云適奉方丈慈旨令就上寮附名侍者次第發榜頭下堂司維那令行者請新到喫茶畢出度牒上床歷詳具大掛搭歸堂候送歸堂或有故出入須守堂儀半月方可請假古云請假遊山者常將半月期過期重掛搭依舊守堂儀如迫師長父母疾病喪死者不在此限凡寢堂中必設參椅示尊師道也新到相看住持當居中位令其插香展禮側坐受茶於禮無損今北方猶行之所時新學沙彌才方入眾便與大方宿德分坐抗禮視為故常循習成弊至於獵等犯分以啟外侮師道蕩然能尊師則尊法尊法則叢林紀綱振矣若西域諸師其徒奉之猶君父之尊惟恐不及可為法也大相看大方多眾又尊宿嚴重無汎常數見之禮新到須候人多各預詣侍司附名作一起相看侍者稟定或九月初或冬前年節眾推辦事名勝或熟於叢林者為參頭至日領眾至寢堂排立侍者請住持出參頭進云請和尚趺坐住持垂語參頭下語已退步同眾問訊插香展禮次謝侍者次早赴方丈茶求掛搭候發榜式見後下堂司送歸堂並與前同住持併在謝掛搭時回禮榜式奉方丈慈旨掛搭一僧某甲上座某甲上座今月日侍司某報大掛搭歸堂堂司承侍司報榜即令行者請新到茶各懷度牒參頭預備小香合準歸堂時用領眾詣堂司對觸禮一拜敘寒溫入座受茶畢起稟云某等適奉方丈慈旨令依附左右伏望甄錄維那答云多幸喜得同守寂寥參頭與眾各取度牒遞付維那仍對觸禮一拜逐一上床曆訖付還只留參頭度牒行者喝云請眾首座歸堂掛搭參頭領眾前門右手入堂至聖僧前排立參頭燒香同眾大展三拜巡堂一匝自上堂至下堂仍如前排立問訊從班尾先移步退聖僧板頭立維那入堂燒香上間立堂司行者用盤袱托度牒維那付還參頭同眾對觸禮一拜參頭送維那出齋前後門齋後前門參頭不出門限維那發諸寮報榜式見後行者引至眾寮鳴內板三下寮主相接入門對觸禮一拜敘寒溫畢分手坐獻空盞便起身於香爐前問訊謝畢云某等適奉維那慈旨令歸上寮依棲左右敢望慈悲寮主云茲來多幸且喜同守寂寥即各觸禮一拜新掛搭人轉東邊寮主轉西邊又觸禮一拜寮主引掛搭人排列朝觀音問訊引巡案一匝復朝觀音問訊而退不須送出行者引見寮元對觸禮一拜云即日恭惟坐元禪師尊候起居多福茲蒙方丈慈旨令某等依附左右敢望垂慈下情不勝感激之至次詣諸頭首寮庫司各觸禮一拜敘寒溫畢送出今多不相接止傳語或謂止首座處有拜皆非法蓋謝掛搭時兩序回禮通有答拜也榜掛搭一僧某甲上座某州人氏某戒某甲上座今月日堂司某報報侍司曰申尊住持也前堂首座侍司眾寮式必具戒次州名餘皆不具小掛搭歸堂方丈許掛搭侍司發榜下堂司請茶上床曆畢送入眾寮維那居上間對觸禮一拜轉下間又對觸禮一拜掛搭人詞云茲者多幸重辱溫存下情不勝感激之至答云寮舍不便幸乞寬處參頭送維那出眾寮外右立堂司行者鳴寮內小板三下寮主相接禮並同前西堂首座掛搭如大方名德欲作住計語次露意住持度有單寮可處及行坐位次上下安順則留之次日赴茶畢稟云某為生死事大特來依棲即觸禮一拜或別日或即時會兩序勤舊茶住持躬起燒香復位立白云某處西堂首座不棄來此同守寂寥煩兩序勤舊同送歸寮受送人即進前云特來依棲重荷收錄住持同兩序勤舊送歸寮對觸禮一拜送住持出受送人居主位揖侍者入問訊送出揖兩序勤舊入問訊畢即懷香詣方丈拜謝堂司行者引詣兩序勤舊處回禮方丈別日特為管待講茶禮旦望請茶並與勤舊列諸方名勝掛搭凡欲求掛搭次日赴茶罷稟云某等為生死事大特來依棲伏望收錄普觸禮一拜住持如允則會首座知事維那茶畢住持躬起燒香白送意如前受送人進云某等重蒙收錄只歸僧堂隨眾答云山門禮合延送隨職名高下送蒙堂前資對觸禮一拜送住持出與寮主問訊詞云宿生多幸得依左右答云多生緣熟且喜同居受送人轉主位揖侍者人問訊送出與兩序問訊畢即懷香詣方丈拜謝榻位堂司行者引至庫司諸頭首寮回禮或方丈發榜頭煩首座請送則首座令堂司行者請知事一人維那侍者及受送人同至寮首座燒香獻茶白住持發批山門相送之意送入門時首座居主位代住持觸禮一拜受送人歸主位首座轉居客位與知事維那同問訊餘禮並同前法眷辦事掛搭不拘時訪侍者說來歷通覆住持插香展禮若以下法眷曾執侍者住持皆當受禮隨職名高下延送同前拋香相看新到或迫緣故來不及時或止掛搭不得通覆不拘處所纔迎見住持即拋香于前云暫到禮拜和尚觸禮一拜隨自收香伺求掛搭如住持許容則侍司發榜下堂司禮同前若圖帳已定則詣堂司稟添名入圖或人多列戒次後謝掛搭古規掛搭歸堂者即時謝掛搭後以冬節歲節夏前三次謝掛搭自佛照和尚由育王赴徑山權孤雲為入院侍者時佛照以禮繁併在夏前近時衲子到處坐席未溫移單東西多致不謝掛搭既曰經冬過夏折中當在冬前夏前兩期報謝侍者先期取堂司戒臘簿檢看新掛搭戒臘在上者一人為參頭一人為副參舊以諸方侍者為參頭往往以寺門高下爭競不安原夫侍者皆在眾寮掛搭既曰隨眾當依戒臘依戒佛制也況諸圖帳及眾寮戒臘牌不以名字分高下一遵佛制二免爭競三得眾和同居惟住持力主行之參頭當具小圖習儀三人一引每引一人為小參頭須詳記詞語進退折旋合度免致臨時參差堂司行者具名數率香錢寫小榜云新歸堂首座各率錢若干買香謝掛搭堂司行者某取覆貼眾寮前收香錢足交侍者納方丈就稟擬定何日謝掛搭出榜報眾云新歸堂兄弟來日粥罷詣方丈謝掛搭今月日侍司某報至日就寢堂或法堂設住持位排列香几鑪瓶燭臺侍者付大香一片與參頭交副參收領眾依圖位排立參頭隨同侍者請住持出歸位立參頭同眾齊問訊畢參頭進住持前稟云請和尚趺坐退左足側轉身於香几右手空處出行過復位齊問訊畢副參袖中取香捧遞參頭接藏懷中小問訊叉手進爐前左手插香仍從空處過復位齊問訊本引三人一展坐具住持展手約免之即收起參頭進前云某等宿生慶幸獲遂依棲下情不勝喜躍之至仍如前退身香几右手轉歸位問訊再展坐具住持復如前約免收坐具再進前云即日時令謹時恭惟堂頭和尚尊候起居多福仍如前轉歸位問訊觸禮三拜住持答一拜第一引問訊過左邊接班尾次第三人趲上詞禮並同參頭立於侍者下肩伺各各禮畢副參趲到初立處參頭歸元位領眾齊問訊而退副參領眾先行參頭居末至眾寮門外下手立副參引眾從右邊入寮內下間旋轉量眾多寡不拘行數副參趲向前接聯參頭肩次伺住持至與眾俱迎問訊轉入寮內眾當前後相顧成行進退步趨參頭轉身至爐前對觸禮一拜詞云移刻恭惟堂頭和尚尊候起居多福某等重荷收錄禮合拜謝茲蒙降尊下情不勝感激之至眾同送出參頭門外轉上手立副參仍引眾旋轉居上間出聯參頭肩次揖侍者入詞云某等多幸獲依左右茲沐降重不勝感激之至參頭一人送侍者出次揖兩序入對觸禮一拜詞云即刻恭惟座元都總諸位禪師尊候多福某等獲遂依附廼承降重下情不勝感激之至參頭送兩序出復歸上間立副參引眾自觀音後轉出爐前仍顧班尾俱立定對參頭觸禮一拜詞云某等適間甚勞神用特此拜謝其儀亦當預習當日侵早方丈客頭堂司行者各寫回禮榜帖眾寮前方丈榜貼上問兩序榜貼下間式見後堂頭和尚粥罷回禮榜新歸堂首座今月日客頭行者某式承准頭首知事粥罷回禮新歸堂首座今月日堂司行者某拜覆方丈特為新掛搭茶請客侍者照戒臘雙字名寫茶狀式見後至日侵晨洗面時備卓子筆硯列照堂請客於名下書云某甲謹拜尊命如掛搭諸方名勝亦依戒寫入茶狀內隔日方丈客頭先持狀請僉名侍者令客頭依戒列名寫特為牌或作四出六出首座光伴諸方名勝必與住持對面位若有異議則於名勝內推戒最高者坐之參頭與光伴對面位蓋受送者先謝榻位此同赴茶耳至日齋罷鳴鼓集眾侍者揖入住持相接問訊次與光伴人問訊各依照牌歸位立定燒香侍者請客侍者分左右位頭行禮巡揖坐揖香揖茶燒光伴香鳴鼓退座並與四節小座湯禮同受特為人引眾排立謝茶初展云某等此日重蒙煎點特此拜謝下情不勝感激之至再展云即日時令謹時恭惟堂頭和尚尊候起居多福退身觸禮三拜而退次日庫司客頭行者依戒單字名具茶狀列眾寮前請僉名書云某甲敬依來命庫堂排位首座光伴鳴庫堂板上首知事與維那行禮又次日首座眾頭首具狀請僉同前照堂排位都寺光伴鳴照堂板全班行禮或四人六人分巡問訊如三人五人首座燒香只居中立古法三日講行令諸方多併作一日就方丈借座及鼓頭首知事空住持一位互為主伴位次行禮並同但謝茶必當齊離位轉身問訊致謝近習只位頭起謝非禮也新掛搭某甲上座列名堂頭和尚今晨茶齋退就寢堂點茶特為伏希雲集今月日侍司某拜請庫司頭首則云新掛狀搭某上座列名右某等今晨齋退就庫司點茶一中特為伏望眾慈同垂降重式今月日庫司比丘某等拜請頭首當列名止於知客就照堂餘同前坐禪每日粥罷堂司行者先覆首座僧堂前眾寮前俱掛坐禪牌報眾令供頭僧堂內裝香點燈先鳴眾寮前板一聲大眾歸堂向裏坐次第俱集覆眾頭首鳴板第二聲候入堂少緩鳴板第三聲副寮閉眾寮門鳴首座寮前板三聲初聲出門二聲約到半途三聲入堂首座聖僧前燒香巡堂自下間至上間一匝就歸被位坐次覆住持鳴方丈板三聲住持入堂燒香覆堂自上間至下間一匝歸位坐定久之僧眾方可次第起身抽解又須看上下肩起止急緩免見成連單位空缺或有留被在堂不隨眾者或有暫來隨眾留袈裟在被位於外放逸者皆當檢舉懲罰頭首大眾並從出入板往來唯前堂首座許從住持前出入堂司行者候齋次第覆首座放禪轉從聖僧後右出撑簾下牌輕撼作聲住持頭首出堂堂司行者右邊側立伺候問訊或山門有迎接祈禱普請看誦送亡及眾寮淨髮洗衣則不坐禪亦不坐參參後坐禪如常住持首座仍巡堂堂中有直堂牌刻云輪次直堂周而復始住山押兩面刻照依被位資次每日五更鍾絕後交下次人終日看守或有開櫃插單下鉢抽被者皆當白直堂人知至放參鍾鳴時交付聖僧侍者看管至晚則眾僧皆守被位矣牌則在次早交過近時直堂成群相陪分俵果核聚談戲笑習以為常惱亂禪寂住持首座力戒違者示罰坐禪儀夫學般若菩薩起大悲心發弘誓願精修三昧誓度眾生不為一身獨求解脫放捨諸緣休息萬念身心一如動靜無間量其飲食調其睡眠於閒靜處厚敷坐物結跏趺坐或半跏趺以左掌安右掌上兩大拇指相拄正身端坐令耳與肩對鼻與臍對舌拄上腭唇齒相著目須微開免致昏睡若得禪定其力最勝古習定高僧坐常開目法雲圓通禪師呵人閉目坐禪謂黑山鬼窟有深旨矣一切善惡都莫思量念起即覺常覺不昧不昏不散萬年一念非斷非常此坐禪之要術也坐禪乃安樂法門而人多致疾者蓋不得其要得其要則自然四大輕安精神爽利法味資神寂而常照寤寐一致生死一如但辦肯心必不相賺然恐道高魔盛逆順萬端若能正念現前一切不能留礙如楞嚴經天台止觀圭峯修證儀具明魔事皆自心生非由外有定慧力勝魔障自消矣若欲出定徐徐動身安詳而起不得卒暴出定之後常作方便護持定力諸修行中禪定為最若不安禪靜慮三界流轉觸境茫然所以道探珠宜靜浪動水取應難定水澄清心珠自現故圓覺經云無礙清淨慧皆依禪定生法華經云在於閒處修攝其心安住不動如須彌山是知超凡越聖必假靜緣坐脫立亡須憑定力一生取辦尚恐蹉跎況乃遷延將何敵業幸諸禪友三復斯文自利利他同成正覺
