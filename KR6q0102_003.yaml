front:
  text: 兩序章第六兩序之設為眾辦事而因以提綱唱道黼黻宗猷至若司帑庾歷庶務世出世法無不閑習然後據位稱師臨眾馭物則全體備用所謂成己而成人者也古猶東西易位而交職之不以班資崇卑為謙今岐而二之非也甚而黨鬪強弱異勢至不相容者有矣惟主者申祖訓以戒之欲其無爭必慎擇所任使各當其職人無間言可也西序頭首前堂首座表率叢林人天眼目分座說法開鑿後昆坐禪領眾謹守條章齋粥精粗勉諭執事僧行失儀依規示罰老病亡歿垂恤送終凡眾之事皆得舉行如衣有領如網有綱也雖大方尊宿若住持能以禮致之亦請充此職謂之退位為人如文殊為七佛師猶助釋迦揚化為眾上首吾宗睦州於黃檗雲門於靈樹光昭前烈詒訓後來名位之重可輕任耶祖庭事苑云首座即古之上座梵語悉替那此云上座一耆年二貴族三先受戒及證道果今禪門所謂首座者必擇其己事已辦眾所服從德業兼修者充之後堂首座位居後板輔贊宗風軌則莊端為眾模範蓋以眾多故分前後齋粥二時過堂及坐禪則後門出入如缺前堂住持別日上堂白眾請轉前板插單唱食其坐禪坐參只眾寮前第三下板即入堂不必鳴首座寮前板餘行事悉與前堂同書記即古規之書狀也職掌文翰凡山門榜疏書問祈禱詞語悉屬之蓋古之名宿多奉朝廷徵召及名山大剎凡奉聖旨勅黃住持者即具謝表示寂有遺表或所賜所問俱奉表進而住持專柄大法無事文字取元戎幕府署記室參軍之名於禪林特請書紀以職之猶存書狀列於侍者使司方文私下書問曰內記云而名之著者自黃龍南公始又東山演祖以是職命佛眼遠公欲以名激之使兼通外典助其法海波瀾而先大慧亦嘗充之凡居斯職者宜以三大老為則可也知藏職掌經藏兼通義學凡看經者初入經堂先白堂主同到藏司相看送歸按位對觸禮一拜此古規也今各僧看經多就眾寮而藏殿無設几案者然充其名當盡其職函帙目錄常加點對缺者補完蒸潤者焙拭殘斷者粘綴若大眾披閱則藏主置簿照堂司所排經單列名逐函交付看畢照簿交收入藏庶無散失推原吾宗既曰教外別傳猶命僧專司其藏者何也以佛之所言所行為教律而僧有不遵佛之言行乎特吾之所證所得不溺於文字而超乎言行之表以見夫自性之妙焉又祖之意欲吾徒遍探諸部與外之百氏期以折衝外侮應變無窮所謂不即不離者是也後以眾多列東西藏知客職典賓客凡官員檀越尊宿諸方名德之士相過者香茶迎待隨令行者通報方丈然後引上相見仍照管安下去處如以次人客只就客司相款或欲詣方丈庫司諸寮相訪令行者引往其旦過寮床帳什物燈油柴炭常令齊整新到須加溫存維那在假則攝其行事僧堂前檢點行益客僧粥飯遇亡僧同侍者把帳暫到死主其喪雪竇在大陽禪月在石霜皆典此職毋忽知浴凡遇開浴齋前掛開浴牌寒月五日一浴暑天每日淋汗鋪設浴室掛手巾出面盆拖鞋脚布參頭差行者直浴齋罷浴頭覆維那首座住持畢鳴鼓三下浴聖桶內皆著少湯燒香禮拜想請聖浴次第巡廓鳴板三下遍鳴鼓第一通僧眾入浴第二通末頭首入浴第三通行者入浴此時住持方入以屏風遮隔而浴第四通人力入浴監作行者知事居末浴就彈壓之併點視令息竈中火及炭煤水洒乾淨有餘柴搬於遠處其入浴資次當刊揭浴室外今時謂住持殿頭首後浴知事殿行者後浴非也如往持有故欲同頭首先浴則不用設屏障不入小閣內只頭首板頭解衣室內掛小板旁釘小牌書云鳴板一聲添湯二聲添水三聲則止以此為節如施主設浴則課經回向能妙觸宣明成佛子住則功不浪施矣知殿掌諸殿堂香燈時時拂拭塵埃嚴潔几案或遇風起須息爐內香火及結起幡脚防顧使勿近燈燭施主香錢不得互用佛誕日浴佛煎湯供大眾四齋日開殿門以便往來瞻禮侍者侍者之職最為近密觀道德於前後聽教誨於朝夕親炙參扣期法道底于大成而禮節常宜恭謹慶喜之侍瞿曇香林之侍雲門佛祖重寄其可忽諸凡住持上堂小參普說開室念誦放參節臘特為通覆相看掛塔燒香行禮記錄法語燒香侍者職之凡住持往復書問製作文字先具草呈如闕書記山門一應文翰書狀侍者職之凡住持應接賓客管待尊宿節臘特為具狀行禮請客侍者職之或維那知客俱不赴眾或在假其行事三侍者皆當攝之或云書狀不當干涉餘事無據若住持久出則歸眾行立暫出則不離班位衣鉢侍者先輩多以叢林老成之士為之蓋能納忠救過羅致人才內外庶事通變圓融庶幾上下雍肅如密菴有如侍者而得松源世其家東叟得昇首座而家法益嚴今諸方往往任後生晚輩甚致敗德誤事可不慎歟湯藥侍者朝暮供奉方丈湯藥左右應接佐助衣鉢侍者撫恤近事行僕或暫缺侍者客至通覆燒香或缺人回向皆宜攝行須擇年壯謹愿者充之聖僧侍者貴有道心齋粥二時上供鳴下堂椎朝夕交點被位中夜剔燈同維那交收亡僧唱衣錢住持遷化把帳頭首秉拂則為燒香或代鳴椎念佛職滿在本山當預侍者名退耕斷橋二老在眾時常充此職以能結眾緣而勵志于道也東序知事都監寺古規惟設監院後因寺廣眾多添都寺以總庶務早暮勤事香火應接官員施主會計簿書出納錢穀常令歲計有餘尊主愛眾凡事必會議稟住持方行訓誨行僕不妄鞭捶設當懲戒擯罰亦須稟議量情示警母縱威暴激變起訟差設莊庫職務必須公平母用私黨致怨上下昔叢林盛時多請西堂首座書記以充此職而都監寺亦充首座書記否則必臘高歷事廉能公謹素為眾服者充之既無取於公而道福殊勝上下美留雖連年不易或數請再充又何傷焉故所在單寮勤舊不滿五六人副寺以下非歷三次不歸前資監寺非三次不歸蒙堂都寺非三次不得居單寮再請出充者公界封鑰元房以避嫌疑齋粥二時必赴堂則行僕行益自然整肅如楊岐之輔慈明石窓之輔宏智可為法則僧史曰知事三綱者若網罟之巨繩提之則百目正矣梵語摩摩帝此云寺主即今之監寺也又大集經云僧物難掌我聽二種人掌三寶物一阿羅漢二須陀洹更復二種一能持淨戒識知業報者二畏後世罪有諸慚愧者維那綱維眾僧曲盡調攝堂僧掛搭辨度牒真偽眾有爭競遺失為辨析和會戒臘資次床曆圖帳凡僧事內外無不掌之舉唱回向以聲音為佛事病僧亡僧尤當究心每日二時赴堂堂前鍾鳴離位入堂聖僧前左手上香退兩步半問訊合掌而入椎邊立先看逐日回看神示名位鍾鼓絕鳴椎一下眾展鉢已再鳴椎一下合掌默回向當日神示左手按砧舉云仰憑大眾念清淨法身毘盧遮那佛圓滿報身十號云云右手鳴椎高不過五寸聲絕方下椎急緩合度俟首座唱食至第三句將畢轉身退至立僧板頭立俟行食遍進前鳴椎一下合掌至聖僧前問訊出堂歸鉢位若施主齋僧行䞋遍食椎後從聖僧後轉左邊朝首座問訊復鳴椎一下而出為請施財也或有他緣或暫假出入將戒臘簿假簿堂司須知簿親送過客司令攝之寄歸傳云維那華梵兼舉也維是綱維華言也那是梵語羯磨陀那刪去三字從略此云悅眾也又十誦律云以僧房中無人知時打揵巨寒切椎音地又無人塗治掃洒講堂食處無人相續鋪床眾亂時無人彈壓等佛令立維那又聲論翻為次第謂知僧事之次第也副寺古規曰庫頭今諸寺稱櫃頭北方稱財帛其實皆此一職蓋副貳都監寺分勞也掌常住金穀錢帛米麥出入隨時上曆收管支用令庫子每日具收支若干僉定飛單呈方丈謂之日單或十日一次結算謂之旬單一月一結一年通結有無見管謂之日黃總簿外有米麫五味各簿皆當考算凡常住財物雖毫木並是十方眾僧有分如非寺門外護官員檀越賓客迎送慶吊合行人事並不可假名支破侵漁其上下庫子須擇有心力能書算守己廉謹者為之病僧合用供給之物即時應付如倉庫疎漏雀鼠侵耗米麥蒸潤一切物色頓放守護有不如法者並須及時照管處置典座職掌大眾齋粥一切供養務在精潔物料調和檢束局務護惜常住不得暴殄訓眾行者循守規矩行益普請不得怠慢撫恤園夫栽種及時均俵同利二時就厨下粥飯食不異眾粥飯上桶先望僧堂焚香設拜然後發過堂直歲職掌一切作務凡殿堂寮舍之損漏者常加整葺動用什物常閱其數役作人力稽其工程黜其游墮母縱浮食蠧財害公田園莊舍碾磨碓坊頭匹舟車火燭盜賊巡護防警差撥使令賞罰惟當並宜公勤勞逸必均如大修造則添人同掌之列職雜務寮元掌眾寮之經文什物茶湯柴炭請給供需洒掃浣濯淨髮椸巾之類每日粥罷令茶頭行者門外候眾至鳴板三下大眾歸寮寮長分手寮主副寮對面左右位副寮出燒香歸位茶頭喝云不審大眾和南遇旦望點湯鳴板集眾燒香行湯如常禮寮主副寮凡安眾處寮元照戒次自下而上請充之寫定名字預貼牌上十日一替佐寮元辦事旦暮僧眾歸堂巡視經案或有遺忘什物者眼同收拾付還及交點本寮什物提調香燈茶湯母容外人止宿及寄賣物件猶預定望寮一名使以次挨補副寮若寮主遇滿從維那請交代副寮遇滿從寮元請交代延壽堂主看視病僧湯藥油燭炭火粥食五味常備供須公界倘缺若自己豐裕結緣應付或勸化施主措辦床席衣被狼籍穢污為其洗浣母生憎嫌八福田中直病為第一也淨頭掃地裝香換籌洗廁燒湯添水須是及時稍有狼籍隨即淨治手巾淨桶點檢添換凡供此職皆是自發道心將交替時堂司預出小榜云下次淨頭缺人如有結緣請留芳名願結緣者收榜白堂司然後覆住持請充之化主凡安眾處常住租入有限必籍化主勸化檀越隨力施與添助供眾其或恒產足用不必多往干求取厭也園主不憚勤苦以身率先栽種菜蔬及時灌溉供給堂厨母使缺乏磨主兼主碓坊米麫供眾極有關系須擇有道心人諳曉舂磨等事者充之水頭五更燒湯供大眾盥手巾面盆燈燭牙藥母令缺少冬月烘焙手巾須早起鋪排勿致臨時動眾念炭頭預備柴炭以禦寒事或化施主或出公界須令足用莊主視田界至修理莊舍提督農務撫安莊佃些少事故隨時消弭事關大體申寺定奪近時叢林凋弊百出而莊中尤甚略舉其三諸方通害初爭莊職安能遍及搆怨住持上下不睦一也一充其職離寺相遠靡所不為致爭起訟供眾錢糧盡皆耗費復積逋負以累于後因而紀綱不振莊佃生侮租課不還其弊二也縱使老成能事充之而州縣應酬吏胥管幹鄉都職役隣里富豪皆合追陪既啟其端稍有不及便生釁隙雖不明支而巧立除破公私無益故莊中之費或半於寺其弊三也只如大家業產巨富不聞分遣子弟遍居莊所蓋耕種有佃提督則有甲幹收租之時自有監收僧行此外縱有輸納修圩依糧等項只臨時分委勤舊知事限期使辦事畢旋歸非唯省費有補常住而消禍未萌公私攸濟今諸方之廢如逃亡家住持勤舊能恤念寺門欲撙費救弊汰除濫冗請自此始其初例有當重難而應充莊職者別議酬補之諸莊監收古規初無莊主監收近代方立此名此名一立其弊百出為住持私任匪人者有之因利曲徇者有之為勤舊執事人連年佔充者有之托勢求充者有之樹黨分充者有之角力爭充者有之蠧公害私不可枚舉雖欲匡救末如之何倘得廉正勤舊輔佐住持公選區用或對眾鬮拈之充充此職者當克己為念奉眾為心毋苛取佃戶母虧損常住則自他俱利矣請立僧首座其事嚴重不可輕舉如大方西堂名德首座行解素為眾所推服者委曲陳情如有允意特為上堂言此間多眾宜得當人相與建立法幢開大爐韛山中幸有某人知見高明慧命所寄少刻下座同兩序大眾拜請為眾開室伏望慈悲特垂開允下座方丈行者以柈袱盛入室普說二牌即於座下同大眾拜請詞云大眾傾心久思示誨伏望慈悲特賜開允受請人隨詣方丈炷香觸禮拜謝詞云某甲幸獲依棲貴圖藏拙既蒙見舉不敢有違答云佛法寄重仰乞垂情謝已堂司行者鳴僧堂鍾大眾同送歸寮住持對觸禮一拜送出次與大眾問訊維那詣寮議請侍者一人掛普說牌預鋪設照堂禪椅拂子主丈爐燭鳴鼓一通眾集立定立僧歸位維那出班燒香同大眾再下拜伸請立僧趺座兩序問訊住持問訊立僧普說竟維那同大眾再下拜伸謝立僧即懷香詣方丈致謝兩展三禮詞云既蒙使令勉顏承當慈悲包荒不勝愧悚仍往庫司諸寮舍問訊方丈備草飯請特為湯藥石至晚湯果兩序光伴立僧侍者預席次日住持請僧堂特為茶請客侍者具茶榜式見後詣寮插香拜請禮與特為新首座同立僧當特為首座大眾茶與前堂特為後堂大眾禮同別日方丈管待請兩序光伴請名德首座住持須預稟露如有允意方丈先請茶兩序光伴即鳴鼓陞座更不報眾住持委曲致懇下座與大眾同伸拜請鳴鍾送歸寮茶湯管待禮與前同進退不混兩序無交代也榜堂頭和尚今晨齋退就雲堂點茶特為新命首座聊旌陳賀之儀仍請諸知事大眾同垂光伴式今月日侍司某敬白兩序進退頭首務擇才德相當者為之而近之庸流責以飲食延接為事使守貧抱道之士愈甘退藏叢林何由歆艶住持當革其弊可也知事古規只列監院維那典座直歲庫頭五員而已職滿鳴椎白眾告退歸堂隨眾初無單寮榻位故叢林鼎盛近來諸方大小勤舊動至百數僕役倍之而僧堂閴無一人泰定間脫歡丞相領行宣政院分上中下三等寺院額定歲請知事員數正為此也宜遵行之凡職事將滿預詣方丈稟退如擇進退日定住持令行者報兩序知當晚昏鍾鳴舊知事一班詣方丈插香告稟觸禮一拜納庫記鑰匙而退就中或有再留者住持隨送到庫司侍者燒香點湯勉留次早五更鍾鳴頭首一班懷香詣方丈觸禮一拜告退或有留者亦同前禮點湯留之住持以擇定人名目子并西堂勤舊令客頭行者請粥罷會茶其舊知事一班候僧堂行粥遍從後門入上首鳴椎一下云白大眾某等昨蒙堂頭和尚慈旨令歸庫今來心力疲倦告退歸堂隨眾謹白再鳴椎一下從聖僧左出住持前兩展三禮初展云某等昨蒙甄錄自愧匪才下情無任愧懷之至再展敘寒溫畢觸禮三拜退身從聖僧右出聖僧前大展三拜轉身從首座板起巡堂一匝中間問訊而退粥罷行者守請新人至寢堂獻茶畢住持躬起燒香一炷歸位白云前兩序告退此務不可缺人拜請某人充知事某人充頭首逐一標名白訖住持出就爐前立侍者揖請新人至住持前對觸禮一拜新知事同進前兩展三禮初展云某等乍入叢林諸事生疎過蒙使令下情不勝恐懼之至再展云即日時令謹時恭惟堂頭和尚尊候起居多福觸禮三拜住持答一拜新頭首進前兩展三禮致訶同前轉位獻湯咸淳規揖坐揖香揖湯至今諸方行之或謂當晚有特為此可免講不講在往持意湯罷謝禮或展或免供頭鳴僧堂鐘大眾歸鉢位立定住持入堂先送前堂首座以次頭首隨歸鉢位各觸禮一拜次送後堂對觸禮一拜新知事一班預立於西堂板頭住持歸位維那往住持前問訊側立如維那已退則知容侍者代行禮住持付目子與之當面問訊從聖僧後轉鳴椎一下云白大眾前知事告退此務不可缺人適奉堂頭和尚慈旨請某人某職某人允某職職謹白復鳴椎一下侍者即揖請新知事一班住持持前觸禮一拜維那白云請知事訖又鳴椎一下知事一班兩展三禮致詞並與前同知事轉聖僧後右出聖僧前排立大展三拜維那引巡堂一匝歸中問訊橫退過西堂板頭立堂司行者喝云大眾禮賀新知事普同觸禮一拜畢又喝云新知事禮謝大眾普同觸禮一拜畢又喝云大眾送新知事歸庫司供頭行者鳴僧堂鍾住持送入對觸禮一拜送住持出與舊人交代互轉身對觸禮一拜送舊人出侍者先賀次頭首領眾賀畢行者喝云大眾送新首座歸寮再鳴鍾送賀畢喝云大眾送新維那歸堂司又鳴鍾送賀畢逐一喝云兩班勤舊送新後堂首座書記藏主知客歸寮送賀交代禮並同前又各喝云大眾送舊首座都寺歸寮亦鳴鍾送賀畢各喝云兩班勤舊送以次舊頭首知事歸蒙堂前資禮亦如前送住持出寮主先相接交互轉身對觸禮一拜不送出然後受賀俱畢新舊人各懷香即詣方丈拜謝新人香係庫司備謝畢新舊人同巡寮方丈請半齋點心齋時草飯仍請西堂勤舊光伴列職雜務待請兩序了別日詣堂司告退次第擇人交替掛鉢時請知事有處住持不先和會默擇人定預分付堂司行者於僧堂早粥罷掛鉢時喝云大眾少立請新知事維那入聖僧前燒香巡堂一匝至住持前問訊側立住持付所請人名目子接訖當面問訊從聖僧後轉鳴椎一下云白大眾適奉堂頭和尚慈旨請某人充某知事逐一白訖侍者揖請新人至住持前受職與前禮同曰方丈會茶請頭首禮並同前侍者進退請兩序畢舊侍者隨住持上方丈咨稟云某等久侍和尚今欲告退隨眾辦道伏望慈悲插香大展三拜而退住持批下堂司請新侍者維那令行者照批請仍請寮元勸請同就堂司茶揖入燒香點茶畢起身再燒香入云適奉堂頭和尚慈旨令請某甲上座充某侍者逐一白訖揖受請人進前普觸禮一拜轉位維那行禮揖坐揖香歸位坐獻湯畢引上方丈住持出維那進前稟云適奉慈旨令請某人充某侍者今引炷香禮拜住持據坐新侍者插香大展三拜畢維那送歸寮對觸禮一拜侍者送出却與舊人交代頭首禮同咸淳規載亦有住持自送侍者歸寮侍者當觸禮一拜送出至大規載若名德之士住持躬送入寮對觸禮一拜維那攸賀而已勿視為常方丈行者直廳轎番拜賀堂司行者引新舊侍者同巡寮畢新侍者再上方丈炷香拜謝舊侍者早晚伺同新侍者方丈問訊三日後住持批下堂司送歸眾寮與維那交互對觸禮一拜送維那出次與寮元問訊畢仍上方丈炷香拜謝聖僧侍者係維那擇人和會充職後引上方丈禮拜隨例茶湯點心管待寮舍交割什物寮舍什物常住置辦不易往往職事人視為傳舍臨進退時鄉人各自搬移蕩然一空使新入寮者茫無所措未免具數到庫司需索不至因此上下唇吻不安設若應副重費常住庫司當置總簿具寫諸寮什物住持知事僉定仍分置小簿付諸寮兩相對同新舊相沿交割損者公界修補缺者本寮陪償將進退數日前副寺帶行者賚簿到各寮預先點對分曉責在本寮人僕母得走失違者陪償或有增添數目隨即同附簿庶可稽考也方丈特為新舊兩序湯請客侍者令客頭行者備柈袱爐燭詣新舊前堂首座處炷香觸禮一拜稟云堂頭和尚請參前就寢堂持為獻湯次新舊都寺前炷香無拜詞語同前以次新舊兩序令客頭請并請勤舊光伴釘掛寢堂鋪設坐位光伴分手新頭首一出新知事二出舊頭首三出舊知事四出餘勤舊預光伴者列主伴兩邊西序居左東序居右燒香侍者預排照牌至時鳴鼓客集同請客侍者行禮小座湯禮同至晚湯果次日粥罷請新舊人茶庫司亦請茶然不及赴赴方丈茶罷却往致謝半齋庫司點心仍提調送舊人粥飯三日堂司特為新舊侍者茶湯草飯罷維那令堂司行者請新舊侍者并聖僧侍者參前就寮獻湯堂司設位排照牌請寮元光伴鳴寮前板接入揖坐禮與庫司同當在方丈特為湯之先庶不相妨行禮候方丈特為新首座茶罷則堂司亦請新舊侍者特為茶次日當專致謝庫司特為新舊兩序湯藥石草飯罷令客頭行者備盤袱爐燭上首知事詣新舊首座舊都寺處炷香詞云今晚方丈湯罷就庫司特為獻湯伏望降重客頭隨後請云湯罷就坐藥石及請新舊大小職事仍請西堂勤舊光伴設位排照牌位分四出新頭首一出舊頭首二出舊知事三出莊庫四出新知事亦依班排位獨維那就座光伴勤舊如方丈排位候方丈湯罷庫司嗚板各依照牌立定都寺巡座揖坐畢燒香揖香依坐位出頭巡問訊歸中燒光柈香歸位坐進湯湯罷起身出詣爐前謝湯畢抽衣就坐藥石堂司送舊首座都寺鉢位維那於兩序進退三日後未開靜時分付堂司行者引人力排燈請舊首座都寺就堂司獻湯維那接入炷香喫湯畢白云清職既滿山門禮合延送鉢位引至僧堂從後門入先送首座次送都寺歸各板頭各觸禮一拜當日掛鉢赴堂方丈管待新舊兩序住持特為上堂一一標名敘謝畢新舊人就座下拜謝請客侍者令客頭行者備柈袱爐燭香合詣新舊首座都寺前炷香陳請云方丈和尚午刻請就寢堂管待客頭請以次新舊人并勤舊光伴寢堂設位排照牌客集報住持出接各入座依照牌立定燒香侍者與請客侍者巡揖坐畢燒香進卓侍者一班列住持前問訊入位行湯下食畢至行飯時燒香侍者離位燒香下䞋飯畢退卓鳴鼓講茶禮與特為湯禮同鳴鼓三下退座新舊人兩展三禮拜謝方丈特為新首座茶管待了次早燒香侍者覆住持令客頭行者備柈袱爐燭香合請客侍者寫茶榜式見前名德首座同詣首座寮炷香觸禮一拜稟云堂頭和尚齋退就雲堂特為點茶伏望降重客頭報眾掛點茶牌仍請知事大眾光伴排照牌侍者行禮並與四節特為禮同惟四板頭不安香几無巡堂請茶禮畢先收首座住持盞首座直趨住持前行禮初展云此日特蒙煎點禮意過勤下情不勝媿感之至再展敘寒溫畢觸禮三拜首座從聖僧後右出堂前住持相送復位執盞侍者燒光伴香畢收盞鳴鼓三下退座首座仍於法堂下間候住持謝茶新首座特為後堂大眾茶方丈特為茶了次早新首座懷香詣方丈拜請云齋退特為後堂首座大眾就雲堂點茶伏望慈悲降重具狀式見後備盤袱爐燭詣後堂首座寮炷香拜請云今晨齋退就雲堂點茶特為伏望降重呈納狀訖特為人令本寮茶頭遞付供頭貼僧堂前下間封皮粘狀前次令堂司行者報眾掛點茶牌長板鳴僧堂內巡請茶鳴鼓集眾行禮並與常特為禮同前堂首座比丘某右某今晨齋退就狀雲堂點茶一鍾特為後堂首座大眾仍請諸知事同垂光降今月日具位某狀式可漏子狀請後堂首堂大眾具位某謹封住持垂訪頭首點茶茶湯禮畢住持齋罷往諸頭首寮點茶從容溫存點檢缺乏隨令庫司措辦兩序交代茶伺方丈特為新首座茶畢次第新職事具威儀懷香躬詣各受代人處插香對觸禮一拜請云齋退拜屈尊重就寮獻茶隨令茶頭請兩序各一人東西序勤舊各一人光伴西序請茶則知事分手坐於同列頭首中請肩下一人光伴如肩上人赴坐位相妨東序請茶則頭首分手坐如維那位居東序請茶時肩下副寺一人赴寮中向內設特為位主席分手位左右光伴人位齋退鳴寮前板接受特為人次接光伴人入位揖坐燒香揖香燒光伴香入座下茶茶畢受代人起將元請香插爐中觸禮拜謝而退次日令堂司行者請交代點心名勝一人光伴前堂首座則請西堂勤舊各一人光伴若庫司一班請西堂勤舊頭首光伴庫司釘掛向裏設特為位左右排光伴位頭首與主席分手同序隨班位次日點心坐位同前西序止於知客東序止於維那凡侍者交代茶與點心當請維那光伴設位行禮皆同近時點心因而請客請鄉曲非禮也入寮出寮茶入蒙堂者白寮主掛點茶牌牌左小紙貼云某拜請合寮尊眾齋退就上寮齋罷備香燭普同問訊揖寮主居主位點茶人居賓位略坐起身燒香問訊復坐點茶收盞寮主起爐前相謝自蒙堂出充頭首者點交代茶畢別日令茶頭報寮主掛點茶牌齋退鳴寮中小板點茶人門外右立揖眾入爐前問訊寮主主位點茶人分手位略坐起身燒香問訊復坐獻茶了寮主與眾起身爐前致謝送點茶人出自眾寮出充頭首者令茶頭預報寮主掛點茶牌齋退鳴板先到眾寮門外右立揖眾入位立定問訊揖坐進中間上下問燒香復中間上下間問訊仍中央問訊寮元揖點茶人對面位坐行茶畢寮元出爐前致謝送出入眾寮者點茶禮與出寮茶同但寮元寮長分賓主位自不可入位坐頭首就僧堂點茶伺點出寮茶畢具茶榜式見後令茶頭貼僧堂前下間具威儀請方丈請茶諸寮掛點茶牌報請預令供頭燒湯出盞庫司備茶燭齋畢就坐點茶頭首入堂炷香行茶與旦望禮同某寮舍湫隘不敢坐邀今晨齋退就雲堂榜點茶一中伏望眾慈同垂降重今月日具位某拜請式本山辦事禪師江湖名勝禪師鄉曲道舊禪師合堂尊眾禪師兩序出班上香凡出班上香行香鳴鈸維那出爐前向外偏立揖住持上香侍者捧合次揖兩序相朝而出轉身問訊住持謂之借香然後上香若聖節佛祖嗣法師忌無借香問訊有立班西堂當先上香或謂首座已出世當先上香者非蓋必與都寺同出班故也西序章終
