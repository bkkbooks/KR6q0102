body:
  text: 大智壽聖禪寺住持臣僧德煇奉勅重編大龍翔集慶寺住持臣僧大訴奉勅校正請新住持發專使凡十方寺院住持虛席必聞於所司伺公命下庫司會兩序勤舊茶議發專使修書頭首知事勤舊蒙堂前資僧眾製疏山門諸山江湖茶湯榜專使署名請書記為之如缺書記擇能文字者分為之用絹素寫榜所請專使或上首知事或勤舊或西堂首座或以次頭首充之若非知事充專使亦須以下知事一人同去掌財議事具須知一冊該寫本寺應有田產物業及迎接儀從一切畢備山門管待專使一行人從至起程日詣諸寮相別鳴僧堂鍾集眾門送三門下釘掛帳設向裏設位講茶湯禮請兩序勤舊光伴如上首知事去則下首知事行禮如頭首勤舊去則上首知事行禮揖坐燒香揖香歸位相伴喫茶再起燒香揖香歸位相伴喫湯收盞專使起謝上轎當代住持受請專使到彼寺先見知客同到庫司接送安下次見頭首及諸寮詣侍司詳稟來歷侍者通覆住持候可否如允請然後令鋪設卓袱安疏帖報兩序至入請住持出專使問訊請趺坐住持中立專使插香大展三拜進前云某蒙山門使令攀屈尊嚴得奉慈顏下情不勝感激之至又三拜詞云即日時令謹時共惟新命堂頭大和尚尊候起居萬福復三拜收坐具住持各答一拜詞云叨膺請命有玷宗風且厪遠來不勝多感專使呈疏帖書問住持接置几上開書疏看過侍者揖坐專使於住持對面坐西堂權趲下一位以讓遠客喫茶畢同兩序送客位堂司行者鳴僧堂鍾大眾詣方丈作賀庫司備香首座知事各插香初展詞云法門多幸伏審榮遷歡動叢林下情不勝喜躍之至再展云即日時令謹時共惟新命某處堂上大和尚尊候起居萬福觸禮三拜住持答一拜詞云自揆疎謬偶膺此選過厪稱賀不勝多愧眾散知客引專使巡寮畢次第呈納本寺須知儀從什物當晚特為湯藥石至夜湯果皆請兩序勤舊光伴庫司排辦受請陞座受請已次日陞座侍者分付行者預於法座下右邊排列疏帖設位專使預稟維那請宣疏帖人侍者覆住持鳴鼓如常上堂式住持出至位立進香卓專使燒香呈疏帖每呈一疏則專使燒香遞上住持逐一拈各有法語宣畢專使仍炷香兩展三拜或觸禮或免在住持意退卓住持登座提綱敘謝結座專使特為新命煎點專使先與新命議定齋䞋輕重合宜兩序勤舊鄉人法眷辦事貼䞋齋料等費專使親送納庫司置辦至日專使詣方丈插香拜請初展云今辰午刻就雲堂特為煎點伏望慈悲降重下情不勝單污之至再展云即日時令謹時共惟新命堂頭大和當尊候起居萬福觸禮三拜住持答一拜兩序單寮係方丈客頭同專使行者一一詣寮稟請掛煎點牌報眾於僧堂內鋪設主席西堂板頭排專使位茶湯榜張于堂外兩側至齋時專使僧堂前伺候住持入堂問訊歸位揖坐歸中問訊揖眾坐聖僧前燒香次上下間次堂外燒香仍歸堂內住持前上下間及外堂問訊仍歸中問訊行食遍燒香下住持䞋次行大眾䞋畢歸位伴齋俟折水出鳴鼓專使再起燒香行禮同前行茶遍瓶出如前問訊收住持盞專使行禮初展云某聊備蔬飯伏蒙慈悲降重下情不勝感激之至二展敘寒溫觸禮三拜送住持出再歸堂燒香大展三拜巡堂一匝并堂外復歸內堂中間問訊收盞鳴鼓三下退座專使隨上方丈致謝次詣庫司謝辦齋再詣方丈請住持至晚藥石至夜湯果皆請兩序勤舊光伴山門管待新命并專使庫司會議管待供䞋如儀上首知事隔日詣新命前插香拜請次詣客位稟請專使令庫司客頭請兩序勤舊光伴弊䞋當如禮不可輕蔑詞語行禮並與特為禮同寢堂中敷住持高座專使附位于右兩序如常列左右勤舊對面位侍者知事下位遠接僕從管待外當支犒勞所至住持多因還赴他山僧行懷其宿憤動致唇吻傳之官員士庶因一人無知而使一寺蒙其惡名老成耆宿外護隣峯當戒戢之然為住持者凡事留遺愛可也新命辭眾上堂茶湯至起離日專使詣諸寮別新命上堂致謝兩序勤舊大眾下座鳴鼓三下向法座立普與大眾觸禮三拜從西廊出鳴大鍾諸法器大眾門送行僕門外排立山門首預釘掛帳設中敷高座向內首座向外攝居主位西堂勤舊分手光伴東西序兩邊朝坐上首知事行禮揖坐揖香歸位點茶收盞再起燒香揖香歸位點湯湯罷起謝上轎兩序勤舊備轎遠送住持當力免之鳴大鍾住持轎遠方止西堂頭首受請專使到寺先見知客同到侍司引見方丈插香展拜相看茶罷送客位次詣諸寮人事畢稟侍者同詣方丈咨稟云某寺今請某人住持住持報兩序勤舊同往受請人寮中敷陳疏帖書問專使插香行禮與請當代同如不允眾為勸請受請後住持請新命及兩序勤舊茶送新命歸客位次第受賀巡寮人事晚請新命專使特為湯藥石湯果兩序光伴受請人陞座專使當隔宿懷香詣方丈觸禮三拜詞云拜請和尚來日為新命和尚引座次日粥罷法座右邊排列椅卓卓上安疏帖座左亦設住持椅子鳴鼓集眾住持出陞座與五參禮同令請客侍者請新命趺坐褒美新命為法而出勸請舉揚慰眾渴仰舉話有無不拘松源為掩室引座笑庵為松源引座皆不舉話石橋為簡常引座息庵為復庵引座皆舉話下座住持歸座左向外而立專使同知客侍者往新命前問訊畢新命出住持前問訊次與兩序大眾問訊若新命是嗣法弟子住持付法衣有法語披衣了進前請住持趺坐大展三拜不收坐具進詞云早蒙陶鑄仰媿先宗來請既勤難逃公命下情無任惶懼之至又三拜進詞云即日時令謹時共惟堂上本師大和尚尊候起居多福又三拜收坐具進前問訊住持答云斯道所寄一綵九鼎不忝當仁惟冀保任却歸座右立專使度疏帖各有法語若非法嗣即出座前與住持問訊次與兩序大眾問訊徑歸座右拈衣拈疏帖有法語專使先稟維那請宣疏帖人宣畢指座有法語登座垂語問答提綱敘謝結座下座到住持前兩展三禮初展詞云叨膺請命有玷宗風仰蒙玉成下情不勝感激之至住持答云喜慶人天之請榮增佛日之光下情不勝欣抃之至再展云即日時令謹時共惟堂頭和尚尊候起居多福觸禮三拜或講或免隨住持意次與兩序大眾問訊知客侍者引巡寮致謝如嗣法者下座先至住持前大展三拜退與大眾問訊然後巡謝同前如以次頭首西堂臨時又在住持斟酌講行專使特為受請人煎點專使詣親命前議定方丈引座䞋資眾䞋宣疏帖人及兩序勤舊江湖鄉人法眷等貼䞋至日粥罷專使懷香詣方丈觸禮拜請云今晨午刻就雲堂備蔬飯特為新命和尚伏望慈悲俯垂降重復詣新命前拜請同前禮方丈客頭同專使行者請諸寮各掛煎點牌於僧堂內住持對面設新命位堂外知客板頭設專使位其茶湯榜張于堂外兩傍至齋時覆新命到僧堂前俟住持同入堂問訊專使隨入堂先揖住持歸位次揖新命歸位燒香行禮並同前下食行䞋茶畢先收新命盞專使進前兩展三禮送新命出後門專使入住持前兩展三禮送住持出前門復歸堂炷香大展三拜巡堂一匝并外堂歸中問訊收盞鳴鼓三下退座當晚湯果藥石光伴同前山門管待受請人并專使就寢堂敷設住持主位新命對面中位左設專使位兩序勤舊光伴左右位下䞋行禮同前受請人辭眾陞座茶湯受請人令侍者同專使預詣方丈稟借法座上堂辭眾座不敷設左設住持位鳴鼓集眾住持出歸位受請人徑往住持前問訊次與大眾和南陞座舉揚畢下座先辭住持觸禮三拜次向法座立辭眾普同觸禮三拜門首向裏中設特位講茶湯兩序勤舊光伴上首知事行禮與當代同鳴大鍾送以次西堂頭首則無辭眾上堂臨行先同專使上方丈插香觸禮三拜稟辭次巡寮辭別山門首茶湯禮同前入院古人腰包頂笠到山門首下笠入門炷香有法語就僧堂前解包屏處濯足取衣披搭入堂炷香聖僧前大展三拜參隨人同拜掛搭已到佛殿拈香有法語大展三拜次土地堂祖堂炷香各有法語入方丈據室有法語次第開堂祝聖今時新命到來當看安下處近遠近則首座領眾往迎遠則兩序勤舊而已專使預當計稟住持必先發批免眾遠迎若安下處近當辦湯果兩序勤舊光伴擇日入院庫司一一排辦隔宿掛接住持牌報眾至時鳴大鍾諸法器大眾門迎由遠至近兩行排立行僕立大眾外新命到門炷香舉法語至佛殿炷香舉法語大展三拜鳴僧堂鍾大眾先歸鉢位立定新命入堂炷香參隨人同展三拜維那當面問訊引巡堂一匝參隨人先出兩序送新命歸鉢位觸禮三拜次至土地堂祖堂炷香各有法語入方丈據室侍者進前炷香問訊側立候舉法語畢行者進卓筆硯知事具狀式見後備柈袱捧呈寺印新命看封付知事開封新命視篆訖就狀上先僉押次題日子使印於上知事收狀衣鉢侍者收印退卓住持起身知事全班進列上首插香兩展三禮初展詞云慈蒙和尚光據法筵下情不勝喜躍之至再展詞云即日時令謹時共惟新命堂頭大和尚尊候起居多福觸禮三拜諸山及頭首勤舊進前插香香不受草賀畢客頭行者喝云請諸山兩班勤舊就座獻湯湯罷請官客諸山點心若前代住持別遷未赴或退居東堂未據室前講交代禮新命受草賀了鳴僧堂鐘領眾躬送前代歸寮對觸禮一拜次首座大眾作賀行僕皆當參拜呈寺當寺庫司比丘某甲寺印一顆印狀右謹申納新命堂頭大和當伏候慈旨年月日具位狀山門請新命齋上首知事候據室後人事稍畢備柈袱爐燭具狀式見後懷香詣方丈請齋兩展三禮初展云午刻就雲堂備蔬飯祇迎伏望尊慈特垂降重下情不勝戰汗之至再展敘寒溫觸禮三拜住持答一拜知事呈狀方丈客頭收庫司客頭鋪設僧堂內住持位行禮與特為管待同當寺庫司比丘某甲右某甲取午刻就齋雲堂備蔬飯祇迎伏望尊慈特垂降重年月日具位某甲狀狀可漏子狀請新命云云尊座前具位謹封開堂祝壽古之開堂朝命下或差官敦請或部使者或郡縣遣幣禮請就某寺或本寺官給錢料設齋開堂各官自有請疏及茶湯等榜見諸名公文集近來開堂多是各寺自備至時入院侍者分付行者鋪設法座報眾掛上堂牌具寫官員諸山名目預呈住持於座左設位鋪卓袱爐燭排列疏帖預先和會維那宣公文首座宣山門疏以次頭首或諸山江湖名勝宣其餘疏及預請諸山一人白椎座前對面排官員位侍者覆方丈鳴鼓眾集侍者同專使入請住持出鐃鈸幡花挑燈迎引至法堂位前立如受請時未拈衣當舉法語披衣畢專使進前插香行禮初展云即日伏蒙和尚先據法筵下情不勝感激之至再展敘寒溫畢觸禮三拜住持答一拜先呈公文舉法語畢接付維那宣白次山門諸山江湖疏一一遞上有法語分送宣讀若見任官請開堂有疏親自捧遞有法語宣畢指法座有法語登座拈香祝聖次拈帝師省院臺憲郡縣文武官僚香侍者逐一度香惟法嗣香住持懷中拈出自插爐中斂衣趺坐侍者燒香下座問訊兩序出班問訊畢侍者再登座燒香問訊禮與旦望上堂同諸山住持送入院者亦出問訊住持當令侍者請官員坐諸山上首出白椎鳴椎一下云法筵龍象眾當觀第一義住持垂語問答提綱敘謝官員諸山云此日開堂端為祝聖不敢多詞敘陳專使兩序勤舊略提過詳在小參時敘陳結座白椎人復鳴椎一下白云諦觀法王法法王法如是下座先受官員作賀畢知事接送客位客頭行者即進爐燭一字排列座前專使插香兩展三禮畢堂司行者喝云諸山人事次喝云西堂人事展禮喝云知事人事兩展三禮又喝云首座大眾人事勤舊蒙堂前資諸寮齊插香同大眾兩展三禮畢莊庫菴塔法眷鄉人暫到展賀畢據