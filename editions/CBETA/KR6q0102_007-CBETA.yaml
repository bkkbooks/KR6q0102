復令行者僧堂前掛秉拂牌方丈請秉拂人藥石免赴當送往堂司行者排辦法座左手敷罘罳設住持位昏鍾鳴時行者覆秉拂人次覆住持鳴鼓一通眾集小參禮同住持出徑歸位立定都寺維那侍者同往秉拂人前問訊秉拂人往住持前問訊次知事前問訊巡至班末次至同班前問訊亦巡至班末即舉手與大眾普同問訊登座坐定秉拂侍者同方丈侍者出座下問訊兩序西堂次第問訊住持問訊秉拂人當起身仍就座云侍者請堂頭和尚趺坐秉拂侍者至住持前問訊轉身登座燒香提坐具問訊叉手側立秉拂人索語問答了提綱敘謝方丈及兩序勤舊諸寮大眾畢舉方丈小參公案或拈或頌畢下座住持前問訊復元位以次秉拂人並如前禮秉拂罷方丈客頭唱請湯果如小參時秉拂人即懷香同詣方丈拜謝就坐湯果次日方丈請茶如都寺辦齋併請茶半齋點心別日上堂敘謝管待或請立班西堂在第二夜秉拂住持小參時小委曲勸請舉揚隨意拈頌公案遞相激揚此道近時敘謝循襲繁贅使人厭聽取誚識者蓋秉拂以法為施苟徇時儀但總標名或略提過足矣方丈四節特為首座大眾茶至日粥罷請客侍者寫茶榜見後備柈袱鑪燭詣寮炷香觸禮請云堂頭和尚今晨齋退就雲堂點茶特為伏望降重以榜呈納貼僧堂前上間客頭行者請以次頭首諸寮及請知事光伴掛點茶牌長板鳴請客侍者入堂聖僧前燒香一炷大展三拜巡堂一匝至中問訊而退謂之巡堂請茶堂前排特為照牌首座與住持對面上首知事與住持分手位維那次之以次知事與受特為人分手位鳴鼓集眾燒香侍者行禮並與庫司特為湯禮同首座至住持前謝茶兩展三禮初展云茲者特蒙煎點下情不勝感激之至再展云即日時令謹時恭惟堂頭和尚尊候起居多福退觸禮三拜住持每一展則約止之至觸禮則答一拜首座轉身從聖僧後右出住持略送復位侍者燒光伴香鳴鍾收盞鳴鼓退座亦同前首座先往法堂候住持拜謝免則問訊榜堂頭和尚今晨齋退就雲堂點茶一中特為首座大眾聊旌某節之儀仍請諸知事同垂光降式今月日侍司某敬白庫司四節特為首座大眾茶遇節之次日粥罷庫司具茶榜與湯同請茶報眾掛牌長板鳴入常請茶與侍者同齋退排照牌設位鳴鼓集眾揖坐揖香揖茶巡堂問訊住持前行禮致詞並同湯禮前堂四節特為後堂大眾茶遇節之第三日首座具茶狀見後詣後堂首座寮及詣方丈請茶講行禮儀次第並與庫司特為茶同但添設知事位次前堂首座比丘某右某啟取今晨齋退就茶雲堂點茶一中特為後堂首座大眾聊旌某節之儀仍請諸知事同垂光伴今月日具位某狀狀可漏子狀請後堂首座大眾具位謹封旦望巡堂茶住持上堂說法竟白云下座巡堂喫茶大眾至僧堂前依念誦圖立次第巡入堂內暫到與侍者隨眾巡至聖僧龕後暫到向龕與侍者對面而立大眾巡遍立定鳴堂前鍾七下住持入堂燒香巡堂一匝歸位知事堂排列聖僧前問訊轉身住持前問訊從首座板起巡堂一匝暫到及侍者隨知事後出燒香侍者就居中問訊揖坐俟眾坐定進前燒香及上下堂外堂先下間次上間香合安元處爐前逐一問訊揖香畢歸元位鳴鐘二下行茶瓶出復如前問訊揖茶而退鳴鐘一下收盞鳴鍾三下住持出堂首座大眾次第而出或迫他緣或住持暫不赴眾則粥罷就座喫茶侍者行禮同前方丈點行堂茶節臘僧堂茶罷侍者同客頭至行堂點茶客頭預報參頭掛點茶牌報眾燒湯出盞請典座光伴方丈預送茶侍者至庫司典座接入參頭堂主領眾行者門迎侍者居主位代住持也典座右位侍者出中燒香一炷復位以手揖眾坐喫茶畢典座送出參頭堂主門送即詣方丈謝茶庫司頭首典行堂茶庫司候方丈點茶罷知事詣行堂點茶知事居主位典座分手行禮與方丈侍者同送出門喝云參頭大眾詣庫司謝茶庫司客頭報云知事傳語免謝茶頭首候點僧堂茶見兩序章罷令堂司行者報參頭掛牌報眾請典座光伴行禮與庫司同出門喝謝喝免亦同月分須知正月初一日有處四孟月大眾行道諷經祈保次具門狀官員檀越諸山賀歲十七日百丈忌二月初一日僧堂內閉爐或山寺高寒母拘十五日佛涅槃三月初一日堂司出草單清明日祖堂諸祖塔諸檀越祠庫司預報洒掃嚴備供養集眾諷經此月出榜禁約山林茶笋四月初一日鎖旦過初四五間告香普說初八日佛誕浴佛庫司預造黑飯方丈請大眾夏前點心十三日建楞嚴會十五日結制候天氣僧堂內下暖簾上涼簾五月端午日早晨知事僧堂內燒香點菖蒲茶住持上堂次第建青苗會堂司預出諸寮看經誦經單直歲點檢諸處整漏疏浚溝渠方丈詣諸寮諸庵塔各作一日點茶溫存僧堂內掛帳六月初一日隆暑首座免鳴坐禪板入伏堂司提調晒薦炭頭或庫司打炭團七月初旬堂司預出盂蘭盆會諸寮看誦經單預率眾財辦斛食供養十三日散楞嚴會十五日解制當晚設盂蘭盆會諷經施食八月初一日開旦過知客預晒寮內薦席此月修補本色衲子未遽起單僧堂收帳九月初一日首座復鳴坐禪板堂司提調糊僧堂窓下涼簾上暖簾重陽日早晨知事燒香點茱萸茶住持上堂許方來相看十月初一日開爐方丈大相看初五日達磨忌十一月二十二日帝師忌冬至庫司預辦糍果此月或進退職事或在歲節方丈請大眾冬前點心十二月初八日佛成道庫司預造紅糟歲終結呈諸色簿書節臘章終法器章第九上古之世有化而無教化不足而禮樂作焉擊壤之歌不如九成之奏窪樽之飲不若五齊之醇然文生於質貴乎本也吾天竺聖人最初示化謂人人妙覺本無凡聖物物全真寧有淨穢無假修證不涉功用而昧者茫然自失若聾瞽焉於是隨機設教擊犍椎以集眾演之為三藏修之為禪定迄于四十九年而化儀終矣梵語犍椎凡瓦木銅鐵之有聲者若鍾磬鐃鼓椎板螺唄叢林至今倣其制而用之于以警昏怠肅教令導幽滯而和神人也若夫大定常應大用常寂聞非有聞覺亦非覺以考以擊玄風載揚無思無為化日自永雍雍乎仁壽之域清泰之都矣鍾大鍾叢林號令資始也曉擊則破長夜警睡眠慕擊則覺昏衢疏冥昧引杵宜緩揚聲欲長凡三通各三十六下總一百八下起止三下稍緊鳴鍾行者想念偈云願此鍾聲超法界鐵圍幽暗悉皆聞聞塵清淨證圓通一切眾生成正覺仍稱觀世音菩薩名號隨號扣擊其利甚大遇聖節看經上殿下殿三八念誦佛誕成道涅槃建散楞嚴會諷經齋粥過堂人定時各一十八下如接送官員住持尊宿不以數限庫司主之僧堂鍾凡集眾則擊之遇住持每赴眾入堂時鳴七下齋粥下堂時放參時旦望巡堂喫茶下床時各三下住持或不赴堂或在假則不鳴堂前念誦時念佛一聲輕鳴一下末疊一下堂司主之殿鐘住持朝慕行香時鳴七下凡集眾生殿必與僧堂鐘相應接擊之知殿主之感通傳云拘留孫佛於乾竺修多羅院造青石鍾於日出時有諸化佛與日俱出密說顯演十二部經聞法證聖不可勝數增一阿含經云若打鍾時一切惡道諸苦並皆停止又金陵志云民有暴死入冥司見有五木縲械者告之曰吾南唐先主也以宋齊丘之誤殺和州降者致此每聞鍾聲暫息吾苦仗汝歸白嗣君為吾造鐘民還具聞後主因造大鐘於清涼寺鐫曰薦烈祖孝高皇帝脫幽出厄版大版齋粥二時長擊三通木魚後三下疊疊擊之謂之長版念誦楞嚴會儆戒火燭各鳴三下報更則隨更次第擊之方丈庫司首座寮及諸寮各有小版開靜時皆長擊之報眾時各鳴二下眾寮內外各有版外版每日大眾問訊時三下坐禪坐參時各三下候眾歸堂次第鳴之點茶湯時長擊之內版掛搭歸寮時三下茶湯行盞二下收盞一下退座三下小座湯長擊之木魚齋粥二時長擊二通普請僧眾長擊一通普請請行者二通相傳云魚晝夜常醒刻木象形擊之所以警昏惰也椎齋粥一時僧堂內開鉢念佛唱食遍食施財白眾皆鳴之維那主之下堂時聖僧侍者鳴之知事告退時請知事時亦鳴之住持入院開堂將說法時諸山上首鳴之謂之白椎也世尊一日陞座大眾集定文殊白椎云諦觀法王法法王法如是世尊便下座磬大殿早慕住持知事行香時大眾看誦經呪時直殿者鳴之唱衣時維那鳴之行者披剃時作梵闍黎鳴之小手磬堂司行者常隨身遇眾諷誦鳴之為起止之節鐃鈸凡維那揖住持兩序出班上香時藏殿祝贊轉輪時行者鳴之遇迎引送亡時行者披剃大眾行道接新住持入院時皆鳴之鼓法鼓凡住持上堂小參普說入室並擊之擊鼓之法上堂時三通先輕敲鼓磉二下然後重千徐徐擊之使其緊慢相參輕重相應音聲和暢起復連環隱隱轟轟若春雷之震螫第一通延聲長擊少歇轉第二通連聲稍促更不歇聲就轉第三通一向纏聲擊之侯住持登座畢方歇聲雙椎連打三下小參一通普說五下入室三下皆當緩擊茶鼓長擊一通侍司主之齋鼓三通如上堂時但節會稍促而已普請鼓長擊一通更鼓早晚平擊三通餘隨更次擊庫司主之浴鼓四通次第候眾擊其詳見知浴章知浴主之已上宜各有常度毋令失准若新住持入院諸法器一齊俱鳴金光明經云信相菩薩夜夢金鼓其狀姝大其明普照喻如日光光中得見十方諸佛眾寶樹下坐琉璃座百千眷屬圍繞而為說法一人似婆羅門以枹擊鼓出大音聲其聲演說懺悔偈頌信相菩薩從夢寤已至於佛所以其夢中所見金鼓及懺悔偈向如來說又楞嚴經云阿難汝更聽此祇陀園中食辦擊鼓眾集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處法器章終唐洪州百丈山故懷海禪師塔銘將仕郎守殿中侍御史陳詡撰守信州司戶參軍員外置同正員武翊黃書星纏斗次山形鷲立桑門上首曰懷海禪師室於斯塔於斯付大法於斯其門弟子懼陵谷遷𧵍日時失紀託於儒者銘以表之西方教行于中國以彼之六度視我之五常遏惡遷善殊途同轍唯禪那一宗度越生死大智慧者方得之自鷄足達于曹溪紀牒詳矣曹溪傳衡嶽觀音臺懷讓和上觀音傳江西道一和上詔諡為大寂禪師大寂傳大師中土相承凡九代矣大師太原王氏福州長樂縣人遠祖以永嘉喪亂徙于閩隅大師以大事因緣生於像季託孕而薰羶自去將誕而神異聿來成童而靈聖表識非夫宿植德本曷以臻此落髮於西山慧照和尚進具於衡山法朝律師既而歎曰將滌妄源必遊法海豈惟必證亦假言詮遂詣廬江閱浮槎經藏不窺庭宇者積年既師大寂盡得心印言簡理精貌和神峻睹即生敬居常自卑善不近名故先師碑文獨晦其稱號行同於眾故門人力役必等其艱勞怨親兩忘故棄遺舊里賢愚一貫故普授來學常以三身無住萬行皆空邪正並捐源流齊泯用此教旨作人表式前佛所說斯為頓門大寂之徒多諸龍象或名聞萬乘入依京輦或化洽一方各安郡國唯大師好尚幽隱棲止雲松遺名而德稱益高獨往而學徒彌盛其有遍探講肆歷抵禪關滯著未祛空有猶閡靡不緘藏萬里取決一言疑網雲張智刃氷斷由是齊魯燕代荊吳閩蜀望影星奔聆聲飈至當其饑渴快得安隱超然懸解時有其人大師初居石門依大寂之塔次補師位重宣上法後以眾所歸集意在遐深百丈山碣立一隅人煙四絕將欲卜築必俟檀那伊蒱塞游暢甘貞請施家山願為鄉導庵廬環遶供施芿積眾又踰於石門然以地靈境遠頗有終焉之志元和九年正月十七日證滅於禪床報齡六十六僧臘四十七以其年四月二十二日奉全身窆于西峯據婆沙論文用淨行婆羅門葬法遵遺旨也先時白光去室金錫鳴空靈溪方春而涸流杉燎竟夕以通照妙德潛感于何不有門人法正等甞所稟奉皆得調柔遞相發揮不墜付囑他年紹續自當流布門人談敘永懷師恩光崇塔宇封土累石力竭心瘁門人神行梵雲結集微言纂成語本凡今學者不踐門閾奉以為師法焉初閩越靈藹律師一川教宗三學歸仰嘗以佛性有無響風發問大師寓書以釋之今與語本並流于後學詡從事于江西府備嘗大師之法味故不讓眾多之託其文曰梵雄設教有權有實未得頓門皆為暗室祖師戾止方傳祕密如彼重昏忽懸白日其一唯此大士弘紹正宗雖修妙行不住真空無假方便豈俟磨礱恬然返本萬境圓通其二百千人眾盡祛病熱彼皆有得我實無說心本不生形同示滅此土灰燼他方水月其三法傳人代塔閉山原杉松日暗寺塔猶存藹藹學徒無非及門唯能覺照是報師恩其四元和十三年十月三日建碑側大眾同記五事至今猶存可為鑑戒并錄于左大師遷化後未請院主日眾議釐革山門久遠事宜都五件一塔院常請一大僧及令一沙彌灑掃一地界內不得置尼臺尼墳塔及容俗人家居止一應有依止及童行出家悉令依院主一人僧眾並不得各受一臺外及諸處不得置莊園田地一住山徒眾不得內外私置錢穀欲清其流在澄其本後來紹續永願遵崇立碑日大眾同記百丈山大智壽聖禪寺天下師表閣記菩提達磨大師後八葉有大比丘居洪之百丈山人稱之曰百丈禪師今天子始命因其舊諡大智覺照者加以弘宗妙行之號寺以壽聖名則故額也山去郡治三百里其未置寺時林壑深阻巖徑峭絕樵蘇之跡所不通有司馬頭陀者善為宮宅地形之術覩其山勢斗拔與夫岡巒首尾之起伏知為吉壤所留鈐記有曰法王居之天下師表禪師之來式符其言東陽德輝以禪師十八代孫嗣住是山既新作演法之堂且增創重屋其上以妥禪師遺像榜其楹間曰天下師表之閣云初文宗皇帝入踐天位即金陵潛邸造寺曰龍翔集慶詔開山大訢領其徒而以禪師所制清規為日用動作威儀之節顧其書行世已久後人率以臆見互有損益自為矛盾靡所折衷煇與訴學同師而柄法於祖庭大懼夫來者傳疑莫知適從無以壹諸方之觀聽爰走京師欲有請而釐正之今御史大夫撒迪時執法中臺為言于上得召見有旨令煇譔次舊聞以授訢使擇習於師說者共考定而頌行為叢林法仍如錫禪師以今號褒顯而風厲焉煇奉璽書將南還以閣之成未及見所紀述諗于溍曰願敘其構興之端原歸而刻諸溍竊觀遂古聖賢乘時繼作弛張迭用循環不窮所以通其變也佛之為教必先戒律諸部之義小大畢陳種種開遮唯以一事去聖逾遠局為專門名數滋多道日斯隱是故達磨不階方便直示心源律相宛然無能留礙世降俗末誕勝真離馳騁外緣成邪慢想是故百丈弘敖軌範輔律而行調護攝持在事皆理蓋佛之道以達磨而明佛之事以百丈而備通變之妙存乎其人厥後達磨之傳派別為五而出於禪師者二他師所倡殊宗異旨雖各名其家至於安處徒眾未有不取法於禪師者然則天下師表之言良可徵不誣也粵自中土君臣知尊佛法光昭崇極莫越於今煇遭值聖時蒙被帝力用克發揚先訓紹隆宗風俾與國家相為悠久永永無已不特今之天下以為師表盡未來際咸有依承溍是用謹志之而於其經度之勤營締之美有不暇論也閣為屋以間計者五其崇百有二十尺三其崇之一以為其修三其修以為其廣以至順元年夏六月庀工冬十月訖事實煇住山之明年而煇入對以元統三年夏五月命下則其明年春二月也承直郎國子博士黃溍記翰林侍制奉議大夫兼國史院編修官揭傒斯書翰林侍講學士通奉大夫知制誥同修國史知經筵事張起巖篆前榮祿大夫御史中丞趙世安光祿大夫江南諸道行御史大夫易釋董阿同立石勅修百丈清規敘天曆至順間文宗皇帝建大龍翔集慶寺於金陵寺成以十方僧居之有旨行百丈清規元統三年乙亥秋七月今上皇帝申前朝之命若曰近年叢林清規往往增損不一於是特勅百丈山大智壽聖禪寺住持德煇重輯其為書仍勅大龍翔集慶寺住持大訢選有學業沙門共校正之期於歸一使遵行為常法德煇等奉命唯謹書將成屬玄為敘玄嘗聞諸師曰天地間無一事無禮樂安其所居之位為禮樂其日用之常為樂程明道先生一日過定寺偶見齋堂儀喟然嘆曰三代禮樂盡在是矣豈非清規綱紀之力乎曰服行之熟故能然乎循其當然之則而自然之妙行乎其中斯則不知者以為事理之障而知之者則以為安樂法門固在是也然使是書龐然雜而不倫則有序而和之意久而微矣故校讐之功有益於是書甚大而兩朝嘉惠學人之旨相為無窮焉宋清規行楊文公億為敘本末條目具詳茲不重出云至元二年丙子春三月上澣翰林直學士中大夫知制誥同脩國史國子祭酒廬陵歐陽玄敘百丈清規行于世尚矣繇唐迄今歷代沿革不同禮因時而損益有不免焉往往諸本雜出罔知適從學者惑之異時一山萬禪師致書先雲翁約先師共刪修刊正以立一代典章無何三翁先後皆化去區區竊欲繼其志而未能也後偶承乏百丈會行省為祖師請加諡未報遂詣闕以聞御史中丞撒迪公引見聖上得面奏清規所以然因被旨重編令咲隱校正仍賜璽書頒行受命以來旁求初本不及見惟宋崇寧真定賾公咸淳金華勉公逮國朝至大中東林咸公所集者為可採於是會參同而詮次之繁者芟訛者正缺者補互有得失者兩存之間以小註折衷一不以己見妄有去取也稍集咲隱凡定為九章章冠以小序明夫一章之大意釐為二卷使閱而行者條而不紊庶幾吾祖垂法之遺意得以遵承而煇懼夫學識荒陋何能上副宸衷作新軌範不過人成事幸畢先志期學者無惑而已若曰立一代典章非愚所敢知也或曰子汲汲於是書若有意於宗教方今國家通制昭布森列奉行猶或未至而欲清規之行乎迂哉因語之然亦未嘗廢其書顧柄法者力行之何如耳佛祖制律創規相須為用使比丘等外格非內弘道雖千百群㞐同堂合席齊一寢食翕然成倫不混世儀不撓國憲陰翊王度通制之行尼於彼達於此又何迂或者謝而退故併識于茲以告吾徒益自勉焉宋楊文公作古規序與夫三公所集自序悉附著云至元後戊寅春三月東陽比丘德輝謹書加祖號跋百丈大智覺照禪師加賜弘宗妙行師號璽書一通至元二年丙子今上皇帝之所授也先是有旨申行百丈清規尋增賜禪師師號故有是命朝論初擬降制詞時玄備列詞林為直學士實典書命一日本山住持德煇偕國子博士黃溍來訪求作清規敘引從詢百丈事蹟煇具道之因及贊書之議意欲見屬玄答之曰萬一當筆向聞師所言腹成矣後格吏文不果越十有二年玄告老家居煇自百丈見訪山中櫝所賜璽書視以漢字錄本請識其事刻石洪惟天朝尊右釋氏歷代師資錫號不一若弘宗妙行四字唯禪師居之無愧焉釋學入門之要戒定慧三者其綱領也禪師探往聖心法卓然以敬之一字教其學者運博大之智於縝奧之功知行互進體用兼備沛其有餘師表天下清規既攽表裏聲教周流無方謂之弘宗妙行誠無間然矣煇本臨濟一宗以負荷為志以顯揚為業始終斯事焉上彰君賜下闡宗風禪門之孝子忠臣有若是者豈不韙歟至正七年丁亥六月初吉前翰林學士承旨榮祿大夫知制誥兼脩國史歐陽玄拜手稽首謹書一山禪師書方九拜復前智者堂上和尚雲翁老師兄子几方自福岩錄翁解組之後多冗而弗克附便奉訊惟極懸懸有來瑰洒佳篇與珍果寵賜感𢠢罙深所寄廉使損齊相公洼製與雄作圓渾而珠明玉潤平淡而山高水深衰鈍不所企及斂袵名世之資抱瑚璉之器於此道精研密煉發而為言無斧鑿痕載司南適四方而弗迷揭明鑑覽萬物而弗惑持家修身治國平天下皆游刃邊事一日九迁倚馬可待松賡或可拈出乞緩頰令重也方居此一年有餘凡百以堪忍自處丁旱歉歲收此間比他群惟庶幾但願從事一二土木如中流失楫耿耿不能置懷陋劣自夏秋以來日事藥裹至今猶未康復吾法兄靜退養高足以眇視當今抗塵之蹟為可羞二年前百丈晦機嘗緘至彼中舊清規閱之其間紕繆殊甚約共𭃗修今東西隔越比話又空屏岩所撰廣略多未適宜愚初立論以祝壽為首如監寺書狀等項設職潤大智元文以小字箋石窓南書記本末于後庶今叢林負職有所從來大概古規中唐文多對偶當盡翻譯奏上刊行為一代典章晦機曾約當拉吾泣兄到抗相與料理今時世如斯何由遂志高見以為如何書書中二偈不敢作答永似為好也未由頂謁床下願言壽護式遄詔擢至禱不備方九拜復感淳間南屏一時勝集一山兄與小弟寧有兩人與雲屋兄參語不見三影事往矣一旦促五十年於一瞬夢耶非夢耶時西湖雪後諸峯玉立舊境宛然二兄精爽飛動日光激射處境耶非境耶佇立久之惟後死者為悽斷不已欲將古規刊正立一代典章今誰同心哉延祐元年十二月初十日東窓雪霽南屏小弟元熙書咸淳三尊宿一山晦機皆余所師敬獨不識雲屋翁而讀其景睦堂詩卷然後識雲屋之深也三老皆欲修清規立一代典章而其徒必能嗣成之則視其操世之柄而視所以維世之具為不相及豈不有愧耶延祐丙辰冬因遊智者古剎覩是有感因題于後杜本
