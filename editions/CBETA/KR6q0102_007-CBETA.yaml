body:
  text: 大智壽聖禪寺住持臣僧德煇奉勅重編大龍翔集慶寺住持臣僧大訴奉勅校正板帳式今具估唱亡僧某甲稱呼衣鉢鈔收支下項一收鈔一千貫文係唱衣鈔收到或別有收鈔名目逐一列寫支鈔九十一貫文係板帳支行開具內一十五貫文回龕三貫文回祭三貫文設粥一貫文龕前燈油十貫文筆紙造單幡花雪柳一貫文淨髮二貫伍伯文移龕擡亡伍伯文燒浴湯二貫文浴亡一貫文直靈上粥飯伍伯文庫司客頭報造祭伍伯文釘掛祭筵伍伯文管計出椀楪伍伯文庫子出給造祭伍伯文監厨造食伍伯文庫司茶頭上茶湯伍伯文參頭差撥行者二貫文堂司行者報眾伍伯文監作差撥又力伍伯文方丈聽叫捧香合十貫文行堂諷經一貫文貼堂司行者鳴廊板二貫文四寮茶頭供應一十伍貫文舁龕一貫文打鈸三貫文鼓樂三貫文扛香卓挑幡燈六人伍伯文俵雪柳柴枝一貫文化亡三貫文方丈一行人僕送喪一貫文四寮人力扛橙卓伍伯文貼堂司行者呈衣伍伯文堂司行者唱衣伍伯文貼供頭遞唱衣標伍伯文供頭收衣伍伯文唱食行者撮鬮伍伯文收骨一貫文擡灰函一貫文直塔共支行支鈔二伯七十貫文係板帳支行外三七抽分歸常住計上件支行支鈔一伯三十伍貫文佛事錢開具內二十貫秉炬一十貫貼秉炬佛事四十貫鎖龕起龕起骨入塔二十貫貼上四項佛事三十貫維那山頭佛事知客侍者把帳一十伍貫貼上三項佛事共支行支鈔一十伍貫文首座主喪都寺押喪維那主磬各伍貫文計上件支行支鈔九貫文知客舉經侍者捧香合各三貫聖僧侍者收唱衣錢二貫直歲度火把一貫計上件支行支鈔一十伍貫文方丈兩序堂司行者抄剳估衣造單三次次點心方丈雙分計上件支行支鈔二十貫文方丈兩序僉單方丈雙分計上件支行支鈔四伯四十四貫伍伯文係俵眾經錢觀音大士聖僧方丈雙分僧眾約四百員各一貫文堂司行者隨僧䞋在假并暫到約七十九人半分各伍伯文共支行除支外見管鈔伍伯文收堂司公用右具如前年月日堂司行者某具把帳侍者某押知客某押直歲知殿典座知浴副寺藏主維那藏主副寺書記監寺首座都寺首座某押兩序並同住持押板帳之設蓋古者凡立成式必書諸板示不可移易也故叢林亡僧有板帳焉凡僧亡以其所有衣物對眾估唱懲貪積也估唱得錢必照板帳支用外其錢作三七抽分歸常住百貫抽三十貫不滿百貫則不抽分餘則均俵僧眾經資一伯則佛事一貫方丈倍之以一千貫為率條列于前約其成式多則增而上之少則降而殺之臨時又量眾隨宜以斟酌之或勤舊有田地米穀房舍床榻卓橙當盡歸常住仍量唱衣錢寡多則排日俵䞋諷經看經添奠茶湯轉龕骨等佛事大眾章終節臘章第八僧不序齒而序臘以別俗也西域三時以一時為安居出入有禁止凡禪誦行坐依受戒先後為次而制以九旬策勳于道以三旬營資身之具使內外均養身心俱安也剋期進修不捨寸陰護惜生命行兼慈忍旨哉聖訓萬世永遵而五竺地廣暑寒霖潦氣候之弗齊故結制有以四月五月十二月然皆始以十六日所謂雨安居者因地隨時惟適之安或曰坐夏或曰坐臘戒臘之義始此如言驗蠟人氷以坐臘之人驗其行猶氷潔或謂埋蠟人於地以驗所修之成虧者類淫巫俚語庸非相傳之訛耶且吾所修證聖不能窺豈外物可測其進退哉今禪林結制以四月望解以七月望者若先一日講行禮儀而期內得專志於道故略繁文亦隨方毘尼或議不如法而不知其得法外意也中土以冬為一陽之始歲為四序之端物時維新人情胥慶禮貴同俗化在隨宜故以結解冬年為四大節周旋規矩聳觀龍象之筵主賓唱酬兼聞獅子之吼禮文秩猗歟盛哉夏前出草單叢林以三月初一日出草單見後方丈止掛搭堂司依戒臘牌寫僧數令行者先呈首座次呈住持兩序掛僧堂前備卓子列筆硯于下凡三日皆齋後出或有差誤請自改正蓋防初上床曆一時恐有錯亂又眾多或致漏落將寫圖帳故先具草單各當自看本名戒次高下近來好爭作閙者往往恃強挾私爭較名字是非互相塗抹喧譁撓眾犯者合擯果有冐名越戒者惟當詳稟維那首座覆住持處置草單式戒次朱書名字墨書清眾戒臘威音王戒陳如尊者堂頭和尚至元幾戒元貞幾戒某甲上座某甲上座大德幾戒至大幾戒某甲上座某甲上座右具如前恐有差誤請自改正伏幸眾悉今月日堂司某具新掛搭人點入寮茶新掛搭人入寮後照列納陪寮錢若干候寮元輪排當在何日掛點茶牌報眾書云今晨齋退某甲上座某甲上座列寫或三人六人九人為度須各備小香合具威儀預列眾寮前右邊立候眾下堂茶頭即鳴寮前板眾至揖迎歸位立定點茶人列一行問訊揖坐坐畢分進中爐上下間爐前燒香人多不過九人則三三進前退步轉身須相照顧詳緩列一行問訊仍分進爐前問訊退仍一行列問訊而立謂之揖香鳴寮內小板二下行茶遍瓶須從穿堂入仍如前進前問訊復退作一行問訊謂之揖茶鳴小板一下收盞眾起立定寮元出爐前對點茶人代眾謝茶眾人就位同時合掌謝畢寮元復位點茶人復一行列問訊再各分進鑪前問訊謂之謝眾臨仍退作一行問訊鳴寮前板三下大眾和南而散寮元隨令茶頭請點茶人獻茶候點入寮茶畢寮元逐日衣戒具名點戒臘茶行體並同前出圖帳草單已定堂司依戒臘寫楞嚴圖念誦巡堂圖被位圖鉢位圖式前後互見戒臘牌惟鉢位圖當分十六板餘隨僧堂大小不拘除單寮西堂首座勤舊排板頭外其餘並依戒臘舊以送蒙堂者排副鉢後因爭兢不排悉依戒次具草本呈首座次呈住持看定方寫諸圖正本再呈惟鉢位圖遍呈單寮浴佛日並鋪大殿前被鉢位圖叉當預出書小榜報眾云粥罷排被鉢位伏幸悉眾今月日堂司某白貼僧堂前後門眾寮結解特為眾湯四月初待眾詣方丈謝掛搭罷堂司圖帳已定寮元依戒排經櫃圖茶湯問訊圖清眾戒臘牌入寮資次牌淨髮牌夏中行茶湯瓶盞圖兄弟結緣隨意書名圖成大眾和南時俱出於穿堂十二日午後堂司行者覆住持兩序諸寮掛諷經牌報眾寮元洒掃眾寮預具狀見後貼寮前下間請合寮尊眾特為湯鋪設照牌觀音前設供養上下間排香爐燭臺預煎湯寮元親送方丈令茶頭分送諸寮俱畢鳴寮內小板先講小座湯亦設照牌特為寮主副寮楞嚴頭行瓶盞人請寮長光伴揖坐燒香揖香歸位坐行湯畢方鳴寮前板寮長大眾入座請維那侍者光伴與寮元分手位寮長對面位大眾依戒四案位寮主副寮分案行禮皆巡問訊入座揖坐燒香揖香鳴寮內板二下行湯遍揖湯又鳴板一下收盞畢寮長進爐前謝湯畢鳴寮前板三下退座兩序入寮首座都寺各燒香歸班位立寮元於門外右立伺迎住持入燒香立定寮元於西序班末後立出燒香禮拜楞嚴頭舉呪回向畢寮元送住持出七月十二日禮同守寮比丘某右某啟取今晚就寮煎湯狀一中特為合寮尊眾聊旌某制之儀伏望眾慈同垂光降謹狀今月日守寮比丘某狀式可漏子狀請合寮尊眾禪師守寮比丘某謹狀楞嚴會四月十三日啟建堂司預照大眾戒臘寫圖見後浴佛日諸圖帳俱同出鋪殿前請書記製疏語維那先期擇有音聲者為楞嚴頭引詣方丈庫司問訊皆請點心維那光伴至期寫普回向偈偈見後乃真歇了禪師製貼殿內左右柱上有處見成刻碑則掛牌堂司行者隔宿報眾云來晨粥罷各俱威儀詣大殿啟建楞嚴會諷經就掛諸寮諷經牌次日粥罷候殿上排辦畢覆兩序次覆住持自眾寮前鳴板起巡廊鳴遍鳴方丈板住持出鳴庫堂前大板三下鳴大鍾僧堂鍾殿鍾住持至佛前燒香上茶湯畢歸位行者鳴鈸維那揖住持兩序出班燒香大眾無拜此舊規所載近時有謂大眾同展三拜住持跪爐並與聖節佛誕禮同不知何所祖述原夫大眾拜與住持跪爐宣疏者以祝聖壽報佛恩當嚴其禮以示特重楞嚴會乃祈保安居於禮可殺不若從舊為允白佛宣疏畢楞嚴頭唱楞嚴眾和畢仍作梵音唱念經首序引畢方舉呪呪畢唱摩訶眾和畢維那回向云上來諷經功德回向真如實際莊嚴無上佛果菩提四恩總報三有齊資法界有清同圓種智十方三世一切云云每日粥罷少歇伺眾更衣堂司行者覆兩序次覆住持然後巡廊鳴板各三下遍住持出則鳴大板三下不出則不鳴鳴僧堂鐘殿鐘不鳴大鐘集眾諷呪畢楞嚴頭舉普回向偈大眾同聲念如遇旦望則祝聖壽係維那回向至七月十三日滿散禮同但楞嚴頭唱念呪尾之末章維那回向而散上來現前比丘眾諷誦楞嚴祕密呪回向護法眾龍天土地伽藍諸聖造普三塗八難俱離苦四恩三有盡沾恩回國界安寧兵革銷風調雨順民康樂向一眾熏修希勝進十地頓超無難事偈山門鎮靜絕非虞檀信歸依僧福慧十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密疏語啟建金由淬礪之精其鋒莫挫鏡假鍊磨之瑩則照不昏故先聖顯抑揚之機為眾生破微細之惑摩登慶喜妙協冥權世尊文殊特彰化軌闡一代教觀則有觀有教示密因修證而無證無修明真見而息諸塵空花無蒂居正定以制群動止水不波顧末裔之何知誦遺言而自警伏願促恒河沙劫為一念無間長期會十方剎土以同居咸成正覺滿散睠此林園宛爾祇桓精舍現前海眾儼然一會靈山括大千於微塵融三際於當念屬休夏之自恣無犯無持總萬象以交參孰凡孰聖人人妙覺剎剎毘盧示現千百億身超越五十七位以指喻指之非指指亦俱亡似空藏空而合空空寧可餉為憐幼穉特獎愚蒙遵遺教以受持賴安居之無障伏願奢摩寂靜具足諸塵勞門大用繁興等入首楞嚴定戒臘牌堂司侍司眾寮預依戒臘寫造至十四日午後堂司牌列僧堂前上間侍司牌列法堂下間眾寮牌列寮內各備香几爐燭供養大眾各炷香展拜畢仍各收牌掛起方丈小座湯四節講行按古有三座湯第一座分二出特為東堂西堂請首座光伴第二座分四出頭首一出知事二出西序勤舊三出東序勤舊四出西堂光伴第三座位多分六出本山辦事諸方辦事隨職高下分坐職同者次之首座光伴侍司預備草圖呈方丈議定至日依名書照牌午後備卓袱作一二三座陳列寢堂下間東西堂前堂首座都寺係請客侍者各詣寮觸禮拜請云堂頭和尚請今晚就寢堂特為獻湯餘頭首辦事名勝方丈客頭行者請云方丈和尚參前請就寢堂特為獻湯寢堂釘掛排位秉燭裝香畢客頭行者覆侍者次覆方丈鳴鼓初座客集侍者揖引至住持前問訊依照牌入位立定燒香侍者請客侍者分往特為人前巡問訊揖坐已復位並立燒香侍者進前燒香仍歸位與請客侍者同時轉身分巡問訊揖香候鳴板二下行湯遍仍巡揖湯畢燒香侍者進燒光伴香鳴板一下收盞鳴鼓五下退座三座行禮並同叢林以茶湯為盛禮近來多因爭位次高下遂寢不講住持當力行之江湖老成當力從臾之庶將來知所矜式云四節土地堂念誦凡遇節先一日午後土地堂嚴設供養排香燭臺凡爐瓶堂司行者報眾掛念誦牌巡廊鳴板與三八同眾集相對雁立住持先祖堂次大殿炷香三拜鳴大板三下鳴大鍾住持至大眾俛首合掌為迎住持侍者隨後只當叉手而過燒香歸位行者鳴鈸維那出揖班上香畢念誦回向見後切以薰風扇野炎帝司方當法王禁足之辰乃釋子護生之日恭裒大眾肅詣靈祠誦持萬德洪名回向合堂真宰所祈加護得遂安四居仰憑大眾念云云切以金風扇野白帝司方當覺皇解制之辰節是法歲周圓之日九旬無難一眾咸安誦持萬德洪名仰答合堂真宰仰憑大眾念云云念切以時臨亞