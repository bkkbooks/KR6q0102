front:
  text: 古清規序翰林學士朝散大夫行左司諫知制誥同修國史判史館事上柱國南陽郡開國侯食邑一千一百戶賜紫金魚袋楊億述百丈大智禪師以禪宗肇自少室至曹溪以來多居律寺雖列別院然於說法住持未合規度故常爾介懷乃曰佛祖之道欲誕布化元冀來際不泯者豈當與諸部阿笈摩教為隨行耶或曰瑜珈論瓔珞經是大乘戒律胡不依隨哉師曰吾所宗非局大小乘非異大小乘當博約折中設於制範務其宜也於是創意別立禪居凡具道眼者有可尊之德號曰長老如西域道高臘長呼須菩提等之謂也即為化主即處於方丈同淨名之室非私寢之室也不立佛殿唯樹法堂者表佛祖親囑受當代為尊也所裒學眾無多少無高下盡入僧堂依夏次安排設長連床施椸架掛塔道具臥必斜枕床脣右脇吉祥睡者以其坐禪既久略偃息而已具四威儀也除入室請益任學者勤怠或上或下不拘常準其闔院大眾朝參夕聚長老上堂陞座主事徒眾雁立側聆賓主問酬激揚宗要者示依法而住也齋粥隨宜一時均遍者務于節儉表法食雙運也行普請法上下均力也置十務謂之寮舍每用首領一人管多人營事令各司其局也或有假號竊形混于清眾別致喧撓之事即當維那檢舉抽下本位掛搭擯令出院者貴安清眾也或彼有所犯即以拄杖杖之集眾燒衣鉢道具遣逐從偏門而出者示恥辱也詳此一條制有四益一不污清眾生恭信故二不毀僧形循佛制故三不擾公門省獄訟故四不泄於外護宗綱故四來同居聖凡孰辦且如來應世尚有六群之黨況今像末豈得全無但見一僧有過便雷例譏誚殊不知輕眾壞法其損甚大今禪門若稍無妨害者宜依百丈叢林規式量事區分且立法防姦不為賢士然寧可有格而無犯不可有犯而無教惟大智禪師護法之益其大矣哉禪門獨行自此老始清規大要遍示後學令不忘本也其諸軌度集詳備焉億幸叨叡旨刪定傳燈成書圖進因為序引旹景德改元歲次甲辰良月吉日書崇寧清規序夫禪門事例雖無兩樣毘尼衲子家風別是一般規範若也途中受用自然格外清高如其觸向面牆實謂減人瞻敬是以僉謀開士遍摭諸方凡有補於見聞悉備陳於綱目噫少林消息已是剜肉成瘡百丈規繩可謂新修特地而況叢林蔓衍轉見不堪加之法令滋彰事更多矣然而莊嚴保社建立法幢佛事門中闕一不可亦猶菩薩三聚聲聞七篇豈立法之貴繁蓋隨機而設教初機後學冀善參詳上德高流幸垂證據崇寧二年八月十五日真定府十方洪濟禪院住持傳法慈覺大師宗賾序咸淳清規序叢林規範百丈大智禪師已詳但時代濅遠後人有從簡便遂至循習雖諸方或有不同然亦未嘗違其大節也余處眾時往往見朋輩抄錄叢林日用清規互有虧闕後因暇日悉假諸本參其異存其同而會焉親手繕寫頗為詳備目曰叢林校定清規總要釐為上下卷庶便觀覽吾氏之有清規猶儒家之有禮經禮者從宜因時損益此書之所以繼大智而作也是皆前輩宿德先後共相講究紀錄愚不敢私以所聞所見而增減之如前所謂參其異存其同而會焉爾耳觀者幸勿病諸咸淳十年甲戌歲結制前二日后湖比丘惟勉書于寄玩軒至大清規序禮於世為大經而人情之節文也㳂革損益以趨時故古今之人情得綱常制度以揆道故天地之大經在且吾聖人以波羅提木叉為壽命而百丈清規由是而出此固叢林禮法之大經也然自唐抵今殆五百載風俗屢變人情不同則㳂革損益之說可得已哉近者大川笑翁二祖唱道南北山日用軌則盛於當代至元戊寅依石林和尚於南屏猶得見其遺風餘烈及友雲明西堂出所藏抄本究心訪問編集成帙始此書之作或以為僧受戒首之或以住持入院首之壬午依覺菴先師於承天朝夕扣問因得以祝聖如來降誕二儀冠其前其餘門分類聚釐十卷然猶未敢以傳學者丙戌夏留雪竇千峯琬西堂論其詳丁亥春溪西澤和尚正其舛得於見聞稔矣而尚以未身行之為媿壬辰夏首眾雙徑小座湯有位次高下之爭諸方往往廢而不舉愚以西堂一出首座再出都寺三出後堂四出藏主維那知客侍者隨職為位請於雲峯伯父力行焉訖事無敢者元貞乙未備員永嘉天寧大德庚子補番陽永福乙巳主廬山東林皆行之無易庶幾人情為折中然視古之清規不幾於繁縟乎蓋凷桴土鼓不可作於笙鏞間知之秋污樽杯飲不可施於犧象駢羅之日目曰禪林備用清規備而不用之謂也知我罪我其惟春秋至大辛亥秋廬山東林弌咸書
