  text: 勅修百丈清規禮部尚書臣胡濙等謹題為重刊清規事禮科抄出江西南昌府奉新縣百丈山大智壽聖禪寺住持僧忠智奏本寺自唐時佛祖大智懷海禪師垂訓名曰百丈清規至元間僧德煇重新編刊遍行天下叢林僧徒循規遵守洪武拾伍年肆月貳拾伍日節該奉太祖高皇帝聖旨榜例諸山僧人不入清規者以法繩之欽此欽遵永樂拾年伍月初三日節該奉太宗文皇帝聖旨榜例僧人務要遵依舊制名務祖風謹守清規嚴潔身心永樂二十二年十一月二十七日該僧錄司官奏僧眾多中間有等不守規矩合無依清規整治節該奉仁宗昭皇帝聖旨照依清規料治他欽此除欽遵外近因本寺清規書板年遠無存欽蒙皇上洪恩普度天下僧行仍住原額寺院熏修香火祝延聖壽臣切見後學僧徒多有未見清規體例罔知軌度不諳戒律甚辱祖風深為未便臣依原體式重寫刊完雖有歷朝序文年代已遠誠恐僧徒視為常事不行遵守今將重刊清規印集一本開坐具本親齎謹奏伏望聖恩憐憫教門乞勅賜清規序文刊圓成書頒行天下叢林寺院住持首僧督眾講習各慕祖風嚴持戒律庶俾僧徒無傷風化正統七年二月十二日該通政使司右通政李錫等官於奉天門奏奉聖旨禮部知道欽此欽遵抄出到部參照住持僧忠智奏稱重刊百丈清規乞賜序文一節合無行移翰林院撰述惟復聽令本僧自行請人述作緣奉欽依禮部知道事理未敢擅便謹題請旨正統七年二月十九日禮部尚書胡濙等官於奉天門題奏奉聖旨序著翰林院撰欽此除外遵依施行正統七年四月十七日皇帝聖旨行中書省行御史臺行宣政院官人每根底宣慰司廉訪司官人每根底軍官每根底軍人每根底城子裏達魯花赤官人每根底往來的使臣每根底百姓每根底眾和尚每根底宣諭的聖旨成吉思皇帝月闊台皇帝薩禪皇帝完者篤皇帝曲律皇帝普顏篤皇帝格堅皇帝忽都篤皇帝札牙篤皇帝亦輦真班皇帝聖旨裏和尚也里可溫先生每不揀甚麼差發休當告天祝壽者麼道說有來如今依著在先聖旨體例裏不揀甚麼差發休當告天與咱每祝壽者麼道札牙篤皇帝教起蓋大龍翔集慶寺的時分依著清規體例行者麼道曾行聖旨有來江西龍興路百丈大智覺照禪師在先立來的清規體例近年以來各寺裏將那清規體例增減不一了有如今教百丈山大智壽聖禪寺住持德煇長老重新編了教大龍翔集慶寺笑隱長老為頭揀選有本事的和尚好生校正歸一者將那各寺裏增減來的不一的清規休教行依著這校正歸一的清規體例定體行者麼道執把的聖旨與了也這的每寺院房舍裏使臣每休安下者鋪馬祇應休拿者稅糧休納者但屬寺家水土園林人口頭匹碾磨店鋪解典庫浴堂竹園山場河泊船隻等不揀是誰休奪要者休倚氣力者這般宣諭了呵別了的人每要罪過者更這的每有聖旨麼道做沒體例句當呵他每更不怕那聖旨元統三年猪兒年七月十八日上都有時分寫來皇帝聖旨裏帝師公哥兒監藏班藏卜法旨行中書省行御史臺行宣政院官人每根底宣慰司廉訪司官人每根底軍官每根底軍人每根底城子裏達魯花赤官人每根底往來使臣每根底本地面官人每根底百姓每根底眾和尚每根底省諭的法旨札牙篤皇帝蓋大龍翔集慶寺的時分教依著百丈清規體例行了聖旨有來這清規是百丈大智覺照禪師五百年前立來的如今上位加與弘宗妙行師號更為各寺裏近年將那清規增減不一教百丈山德煇長老重新編了教龍翔寺笑隱長老校正歸一定體行的執把聖旨與了也皇帝為教門的上頭教依著這校正歸一的清規體例定體行者麼道是要天下眾和尚每得濟的一般眾和尚每體著皇帝聖心興隆三寶好生遵守清規修行辦道專與上位祈福祝壽報答聖恩弘揚佛法者不揀是誰休別了者見了法旨別了的人每不怕那甚麼法旨鼠兒年四月十一日大都大寺裏有時分寫來皇帝聖旨裏行宣政院准宣政院咨據僧子仲狀告係江西道龍興路百丈山大智壽聖禪寺知事僧元統三年七月十八日本寺住持德煇長老欽受御寶聖旨節該江西龍興路百丈大智覺照禪師在先立來的清規體例近年以來各寺裏將那清規體例增減不一了有如今教百丈山大智壽聖禪寺住持德煇長老重新編了教大龍翔集慶寺笑隱長老為頭揀選有本事的和尚好生校正歸一者將那各寺裏增減來的不一的清規休教行依著這校正歸一的清規體例定體行者麼道執把的聖旨與了也欽此除欽遵外緣係各省開讀事理欽錄聖旨全文連前告乞施行得此照得元統三年五月初七日阿察赤怯薛第二日三吉怛納鉢裏有時分對脫別台平章闊兒吉思平章阿魯灰院使舉里學士等不蘭奚大司徒根底撒迪中丞傳奉聖旨江西龍興路裏有的百丈大智覺照禪師在先立來的清規體例近年各寺裏將那清規體例增減了有如今教百丈寺裏住持德煇長老重新編了教大龍翔集慶寺笑隱長老為頭揀選有本事的和尚好生校正歸一與定體執把行的聖旨更百丈大智覺照禪師根底加與弘宗妙行師號宣政院行文書與詞頭宣命者麼道聖旨了也欽此除詞頭宣命具呈中書省照詳外據聖旨移付蒙古房就行翰林院欽依頒降外今據見告當院除外欽錄聖旨全文在前合行咨請照驗遍行合屬欽依施行准此除外欽錄全文在前使院合下仰照驗欽依施行須議剳付者右剳付百丈山大智壽聖禪寺德煇長老准此蒙古字一行至元二年月日勅修百丈清規目錄大智壽聖禪寺住持臣僧德煇奉勅重編大龍翔集慶寺住持臣僧大訴奉勅校正祝釐章第一人之所貴在明道故自古聖君崇吾西方聖人之教不以世禮待吾徒尊其道也欽惟國朝優遇尤至特蠲賦役使安厥居而期以悉力于道聖恩廣博天地莫窮必也悟明佛性以歸乎至善發揮妙用以超乎至神導民於無為之化躋世於仁壽之域以是報君斯吾徒所當盡心也其見諸日用則朝夕必祝一飯不忘而存夫軌度焉聖節欽遇聖節必先啟建金剛無量壽道場一月日僧行不給假示敬也啟建之先一日堂司備榜張于三門之右及上殿經單式見後俱用黃紙書之輪差僧簿依戒次各書雙字名維那先五日袖紙帶堂司行者詣書記寮通報書記出接維那觸禮一拜稟云啟建聖節煩製疏語如書記缺則書狀侍者代之俱缺則用現成疏語見後書記製畢具草先呈住持親送堂司觸禮一拜答先禮也維那用黃紙書疏帶行僕捧盤袱爐燭香合上方丈請住持僉疏炷香觸禮一拜稟云啟建聖節請和尚僉疏僉訖行者就覆住持來早殿上啟建諷經仍報諸寮掛諷經牌燒香侍者覆住持來早上堂至五更住持行香回再覆粥罷上堂令客頭掛上堂牌維那於僧堂早粥遍食椎後再鳴椎一下云白大眾粥罷聞鐘聲各具威儀詣大佛寶殿啟建天壽聖節謹白復鳴椎一下往住持前問訊從首座板起巡堂一匝出外堂下間至上間歸內堂中間問訊而出粥後少停待大殿排香燭茶湯鐃鈸手爐俱辦堂司行者報方丈客頭先覆住持次覆侍者鳴方丈板三下鳴鼓堂司行者預鳴眾寮前板三下集眾坐堂如尋常坐禪向內坐鼓鳴則轉身向外坐頭首先集堂外候鼓鳴即入堂首座後入就坐西堂勤舊蒙堂諸寮並外堂坐住持於鼓初鳴出寢堂坐侍者問訊東立行者問訊西立轉鼓侍者往法座左側立候眾集頭首下床聖僧前問訊領眾出堂至法座前列一行問訊歸西序立大眾雁列于後若不候頭首至先自立定非法也其行堂亦於鼓鳴時鳴板三下參頭領眾行者列庫堂前相對排立候轉鼓知事出則問訊隨其後待西序歸位畢亦列一行座前問訊上首居後都寺引歸東序立定眾行者列知事後稍離遠立侍侍者入請住持出行者問訊住持至法座前行者趲近知事後立冬月則眾去帽問訊住持和南登座侍者隨上法座以香合蓋盛香捧上住持拈香祝壽畢侍者接香以左手插爐中右手拈從香一炷略問訊下座歸班待住持斂衣趺坐侍者先末班引過座下列一行問訊燒香侍者引班歸位次首座領班出列座前問訊大眾同問訊知事轉班列座前問訊行者隨問訊西堂東堂出座下問訊侍者登座左手上香轉身提坐具問訊謂之代眾請法退立座側問答罷陳白事意云某月某日欽遇天壽聖節某寺預於某月某日啟建金剛無量壽道場一月日逐日輪僧上殿披閱金文今辰開啟住持臣僧某陞于此座舉揚聖諦第一義所集洪因端為祝延聖壽萬安者說法竟白云下座各具威儀詣大佛殿啟建天壽聖節謹白此日座下雖有官員亦不得敘謝蓋尊君也鳴大鍾及僧堂前鐘集眾列殿上向佛排立住持上茶湯上首知事遞上燒香侍者就佛座前下茶湯畢住持歸位立定行者鳴鈸維那轉身爐前揖住持上香燒香侍者捧香合次東堂西堂出班上香如有大方諸山住持偶至者令侍者請於兩序前上香次兩序對出向佛問訊上香畢兩兩相朝轉身歸位大眾同展三拜兩序分班對立住持就跪知客跪進手爐侍者跪進香合維那白佛宣疏畢知客跪接爐住持收坐具維那舉楞嚴呪回向云諷誦祕章所萃洪因端為祝延今上皇帝聖壽萬安金剛無量壽佛云云眾散每日堂司行者將輪差僧簿須預先一日請住持頭首眾僧各書雙字名僉押量眾多少依戒具寫差單排定日分周而復始仍列經目對揭殿內柱上至日各務嚴肅鳴大鍾上殿當次僧員須具威儀香合禮佛歸位看經庫司嚴設香燭備點心維那燒香點湯照拂至晚鳴大鍾下殿堂司行者直殿行者常加伺候毋令怠慢如官員入山拈香鳴鍾集眾諷無量壽呪舉藥師號畢回向云某處某官入山拜手拈香僧眾諷誦祕章所萃洪因端為祝延今上皇帝聖壽萬安金剛無量壽云云節內遇三八日佛殿念誦至日齋罷堂司行者覆住持兩序諸寮掛念誦牌報眾參前巡廊鳴板集眾向佛排立住持至鳴大板三下次鳴大鐘燒香歸位維那出班念誦云皇風永扇帝道遐昌佛日增輝法輪常轉為如上緣念清淨法身毘盧遮那佛十號訖回向云上來念誦所集洪因端為祝延今上皇帝聖壽萬安金剛無量壽云云鳴僧堂前鐘三下大眾問訊而散或住持赴郡縣都道場所歸時鳴鐘集眾門迎詣方丈問訊聖節啟散古規所載堂僧堂司給由暫到客司給由隨身照證蓋往時僧道歲一供帳納免丁錢官給由為憑故遊方道具度牒之外有每歲免丁由有何處坐夏由有啟散聖節以備徵詰各亦畏慎今雖不用存其事以見古也黃榜式某州某府某寺某月某日欽遇天壽聖節本寺預於今月某日恭就大佛寶殿啟建金剛無量壽道場一月日逐日輪僧上殿披閱真詮宣持密號所萃洪因端為祝延今上皇帝聖壽萬歲萬歲萬萬歲右恭惟佛日洞明龍天昭格某年某月日都監寺臣僧某謹言住持臣僧某經單式今具經文品目于后大方廣佛華嚴經大佛頂萬行首楞嚴經大乘妙法蓮華經大乘金光明經大方廣圓覺脩多羅了義經大乘金剛般若波羅密經大仁王護國經右具如前今月日綱維臣僧某具差單式今具逐日輪僧上殿名員于後用白紙書某日住持臣僧某甲首座某甲書記某甲藏主某甲知客某甲西堂某日某甲稱呼某甲上座某甲都寺右具如前今月日堂司某具疏語啟建右伏以覆燾無私乾坤孰測其高厚照臨有赫日月莫喻其光華知贊仰之徒勞欲補報而無極惟託鈞陶之內義重四恩故竭忠愛之心虔恭三祝斗樞電繞龍象筵開帝網百億山河咸歸聖量華藏三千世界益衍丕圖少盡涓埃匪懈朝夕欽願蘷龍登用景星耀而泰階平麟鳳呈祥聖人作而萬物覩謹疏滿散優鉢羅花瑞世同佛降生閻浮提樹連陰與天齊壽故毓夙成之睿質克承丕顯之聖謨大哉乾至哉乾體乾居正會其極歸其極建極立中爰以吾道之大同有裨聖時之至治山林鐘鼓樂化日之舒長草木昆蟲被膏澤之滲漉祥開震夙頌祝華封欽願垂拱無為天地位而萬物育鈞陶有象陰陽理而四時平壽考萬年本支百世景命四齋日祝讚景命好日月旦月望初八廿三四齋日隔宿堂司行者報眾掛諷經牌次早鐘絕後鳴僧堂前鐘集眾登殿維那舉楞嚴呪唱藥師號嘆佛畢回向云某日令辰某州某寺住持傳法某僧某謹集合山僧眾恭趨寶殿諷誦大佛頂萬行首楞嚴神呪稱揚聖號所萃洪因祝延今上皇帝聖壽萬安金剛無量壽佛仁王菩薩云云旦望藏殿祝讚旦望古來轉藏祝壽今則必先侵晨登殿御座前祝讚於禮為恭或粥罷陞座罷鳴鐘集眾往藏殿維那舉云摩訶般若波羅蜜多眾當默念住持領眾合掌繞藏行道三匝多眾則一匝立定維那舉大悲呪回向云大圓照中有華藏海功超造化道絕明言三光電卷而實相涵六合雷奔而湛然寂不思議海難盡讚揚某州某寺住持傳法臣僧某月旦望令辰謹集合山僧眾恭趨藏殿繞旋行道稱念摩訶佛母聖號運轉天宮法寶輪藏諷誦大悲圓滿神呪所萃洪因端為祝延今上皇帝聖壽萬安金剛無量壽佛仁王菩薩摩訶薩摩訶般若波羅密每日祝讚齋粥二時下堂僧眾必須登殿維那舉無量壽呪三遍回向云諷誦秘章所萃洪因端為祝延今上皇帝聖壽萬安金剛無量壽佛云云千秋節至期堂司行者隔宿報眾掛諷經牌次早鳴僧堂鐘集眾登殿維那舉楞嚴呪畢白佛四齋日同回向云某道某路某寺某月某日敬遇皇太子千秋令節謹集合山僧眾恭趨寶殿諷誦大佛頂萬行首楞嚴神呪稱揚聖號所萃良因敬祝皇太子睿算千秋殿下伏願日重輪月重輝照臨海宇山如礪河如帶鞏固邦基金剛無量壽佛云云善月正五九為善月預先一日維那令堂司行者覆住持報庫司掛善月牌于殿門前具經單輪差僧簿每日鳴大鐘登殿看經祝贊終月而畢始山隋開皇三年詔天下正五九并六齋日各寺建祈禱道場不得殺生命取藏經中有毘沙門天王每歲巡按四大部洲正五九月治南贍部洲故禁屠宰而唐之藩鎮每上任必犒士卒不下數萬人須大烹宰故以正五九不上官為禁殺也而俗以為忌者非祝釐章終報恩章第二國有禘袷四時之祭所以昭功德隆本始重繼嗣也聖朝崇佛世祖而下咸各建寺謂由佛應身以御天下化儀既終復歸佛位在京官寺於是設聖容具佛壇場月以五祭設奠展禮如生而致夫羹牆之思洪惟聖化所被與佛之教流于無垠而吾徒沐恩波濡聖澤可不知所自而思所報効焉國忌上賓日屆期隔宿庫司報堂司令行者覆住持兩序報眾掛諷經牌就法座上安御座用黃紙寫聖號牌位嚴設香花燈燭几筵供養至期鳴僧堂鐘集眾候住持至上香上茶湯維那舉楞嚴呪諷誦畢回向云某州某寺住持傳法臣僧某某月某日恭遇某聖聖忌之辰謹集合山僧眾謹誦大佛頂萬行首楞嚴神呪稱揚聖號所萃殊利資嚴聖駕伏願神遊八極想雲車風馬來臨位證中天受玉殿瓊樓快樂十方三世云云祈禱凡有祈禱須如法嚴治壇場鋪陳供養住持專心加謹僧眾各務整肅知事內外提督應辦大小寮舍巡警齋潔或有官員拈香恭勤迎送預期庫司稟覆住持先付意旨維那知會堂司行者報眾掛祈禱牌齋粥二時鳴鐘集眾諷經或看藏經或四大部經或三日五日七日隨時而行如祈晴祈雨則輪僧十員廿員或三五十員分作幾引接續諷誦每引諷大悲呪消災呪大雲呪各三七遍謂之不斷輪終日諷誦必期感應方可滿散懺謝其疏意各列于后祈晴切見淫雨為戾物用不成百川橫流民無寧處蓋眾生共業所感惟上天覆燾無私由是謹發誠心啟建祈晴道場每日命僧諷誦經呪仰扣諸聖所冀祈求晴霽速賜感彰伏願掃頑雲於四野陰沴潛消麗杲日於中天容光必照俾五行各順其序而萬彙悉遂其生祈雨切見亢陽為災百物就槁匪上天之降罰由下民之多愆惟諸佛開慈悲之門而神呪有祈禳之應由是謹發誠心啟建祈雨道場每日命僧諷誦經呪仰扣諸聖所冀祈求雨澤速賜感通伏願拯生靈於塗炭厥維艱哉起雲龍于山川俾霶𩃱矣庶茲多稼亦乃有秋祈雪切見時冬恒溫恐生物之疵癘維天降雪淨下土之祲氛庸致瓣香之誠願集六花之瑞由是謹發誠心啟建祈雪道場每日命僧諷誦經呪仰扣諸聖所冀祈求雨雪速賜感通伏願彤雲千里潤澤八荒六府三事用修草木咸若二氣五行順序神人以和遣蝗切見飛蝗蔽天惟凶荒之可慮遺孽入地恐滋蔓之難圖匪假神功之驅除雖極人力而罔措由是謹發誠心啟建遣蝗道場每日命僧諷誦經呪仰扣諸聖所冀驅遣蟲蝗速賜消殄伏願滌之風雨掃種類以無遺投之江河隨業感而自化民安其業物遂其生日蝕此日而食占五紀之或乖畏天之威虞六沴之將作故徇民情而救護盍依佛力以禱禳由是謹發誠心命僧諷誦經呪用伸救護所冀日精速賜還光伏願五色開而黃道明照臨下土群陰消而陽德盛昭回于天月蝕月耀陰精而主夜所賴照臨天示咎徵于下民於焉薄食既戒既懼以禱以禳由是謹發誠心命僧諷誦經呪用伸救護所冀月華速賜還明伏願妖蟇滅跡清光現大地山河顧兔長生萬象納廣寒宮殿報恩章終報本章第三性者人之大本也振天地而莫知其始窮萬世而莫知其終佛與眾生均有是性悟之而登妙覺迷之而流浪生死從劫至劫六道異趣業報展轉無有窮已所賴聖訓洋洋堪作依怙吾徒忝形服預法系遵其行之為律宣其言之為教傳其心之為禪而循吾所謂大本者以同夫佛之全體妙用始可稱佛子而續慧命也其於諱日追悼豈世禮哉佛降誕先期堂司率眾財送庫司營供養請製疏僉疏聖節禮同至日庫司嚴設花亭中置佛降生像於香湯盆內安二小杓佛前數陳供養畢住持上堂祝香云佛誕令辰某寺住持遺教遠孫比丘某甲䖍爇寶香供養本師釋迦如來大和尚上酬慈蔭所冀法界眾生念念諸佛出現于世次趺坐云四月八日恭遇本師釋迦如來大和尚降誕令辰率比丘眾嚴備香花燈燭茶果珍羞以伸供養住持遺教遠孫比丘某甲陞于此座舉唱宗乘所集殊勳上酬慈蔭下與法界眾生同伸希有之慶次說法竟白云下座各具威儀詣大佛殿浴佛諷經謹白下座領眾同到殿上向佛排立定住持上香三拜不收坐具進前上湯進食請客侍者遞上燒香侍者捧置于几畢復位三拜再上香下䞋點茶又三拜收坐具維那揖班上香大眾展拜住持跪爐維那白佛云一月在天影涵眾水一佛出世各坐一華白毫舒而三界明甘露洒而四生潤宣疏畢舉唱浴佛偈云我今灌沐諸如來淨智莊嚴功德聚五濁眾生令離垢同證如來淨法身行道浴佛將畢舉楞嚴呪回向云上來諷經功德回向真如實際莊嚴無上佛果菩提四恩等報三有齊資法界有情同圓種智十方三世一切佛云云疏語大海湛然獨聽潮音之震蕩太虛廓爾惟瞻景緯之橫陳由本大而迹彰抑時至而機應俾群靈咸成正覺從五濁示現降生脫珍服著垢衣委身以徇舍化城登寶所携手同歸初度重臨大恩莫報伏願扇真風於末世揭慧日於中天無佛無魔法法宣揚玉偈非垢非淨塵塵灌沐金軀佛成道涅槃先期堂司率眾財送庫司營供養請製疏僉疏降誕禮同住持上堂祝香云佛成道日某寺住持遺教遠孫比丘某甲奉為法界眾生䖍爇寶香供養本師釋迦如來大和尚上酬慈蔭次冀法界眾生同成正覺次趺坐云臘月八日恭遇本師釋迦如來大和尚成道之辰率比丘眾嚴備香花燈燭茶果珍羞以伸供養住持遺教遠孫比丘某甲陞于此座舉唱宗乘所集殊勳上酬慈蔭普願法界眾生發明自己智慧入微塵剎轉大法輪次說法竟白云下座各具威儀詣大佛殿諷經謹白下座領眾殿上展拜跪爐維那白佛云正覺山前睹明星而悟道大千界內揭慧日以流煇宣疏畢諷經回向涅槃日住持先於佛殿拈香祝聖諷經畢次第上堂祝香云佛涅槃日某寺住持遺教遠孫比丘某甲䖍爇寶香供養本師釋迦如來大和尚上酬慈蔭下與法界眾生同伸攀慕所冀法身常住法輪再轉一切有情悟無生忍次趺坐云二月十五日恭遇本師釋迦如來大和尚入涅槃之辰率比丘眾嚴備香花燈燭茶果珍饈以伸供養住持遺教遠孫比丘某甲陞於此座舉揚涅槃妙心所集殊勛上酬慈蔭普願法界眾生同圓種智者說法竟白云下座各具威儀詣大佛殿諷經謹白下座領眾殿上展拜跪爐維那白佛云淨法界身本無出沒大慈願力示有去來宣疏畢諷經回向並同前疏語成道無量劫來成佛豈假進修眾生日用不知示以先覺覺自覺他而成覺道世出世間而稱世尊闡一代之化儀遵先佛之遺軌坐菩提樹魔宮隱而無光現優鉢花法輪熾然常轉故始喻初日之先照而末示拈花之正傳圓明真常則空有俱亡聖凡夢幻埏埴萬化則今古一瞬天地豪芒顧末裔之何知誦遺言而有惕伏願色空明暗咸宣微妙法音蠢動含靈共證智慧德相涅槃各赴群機法華之囑累授記力制後學遺教之扶律談常矧拈花得旨付法正傳而落葉歸根畢吾能事囿放化者終於盡順世無常寓諸幻而返諸真是名寂滅然神珠恒照於濁垢而寶月不避於污流大定無方常住恒河沙劫圓機普應示現千百億身顧世相之難忘臨諱日而增慕伏願闢末流之邪見回季運之澆漓定慧兼修長如正法住世天魔率化皆為外護宗綱佛生中印土姓剎帝利氏瞿曇梵語瞿曇華言甘蔗其始祖王仙為獵人䠶死血入地生甘蔗二本日炙開一生男號甘蔗王一生女善賢妃生子作轉輪王以日炙又名日種傳七百世至淨飯王佛以累劫功行滿足從兜率天降神王宮摩耶夫人腹胎於周昭王二十六年甲寅歲四月八日生名薩婆悉達七日母喪賴姨母摩訶波闍波提乳養至二十五歲踰城往跋伽仙林中取劍斷髮脫身寶衣從獵師貿袈裟為比丘復北渡恒河至伽闍山靜坐六年苦行日食一麻一米以續精氣復自念若以羸身而取道者彼外道則言自饑是涅槃因乃浴於尼蓮河受牧女乳糜釋提桓因以吉祥草敷坐跏趺於上魔王領兵欲加迫害百計不能少撓作禮悔罪而去二月八日明星出時豁然大悟得無上道成最正覺世相傳以臘月八日或謂周正建子或別有據時年三十歲矣於摩竭提國阿蘭若菩提場中演說華嚴小機未入如聾如瘂於三七日觀樹思惟寧入涅槃梵天帝釋殷勤三請乃詣鹿苑以三乘教轉大法輪先為憍陳如等五人說四諦十二因緣六度等教歷十二年時佛四十二歲至方等會上淘汰弟子漸已開泰於是彈遍擊小歎大褒圓說維摩楞伽楞嚴般若大乘等經又三十年時佛七十二歲說法華經以諸弟子皆可任重授記作佛方暢本懷又八年為穆王五十三年壬申歲時佛七十九歲佛先往忉利天為母說法優填王戀慕鑄金為像聞佛下降金像來迎佛姨母摩訶波闍波提五百比丘尼舍利弗目犍連七萬阿羅漢等不忍見佛涅槃同時入滅菩薩四眾天人八部鳥獸諸王悉集獨受純陀最後之供為諸比丘說無常苦空復言無上正法悉已付囑摩訶迦葉當為汝等作大依止猶如如來又以阿難在娑羅林外為魔所嬈乃勅文殊云阿難吾弟給事我來二十餘年聞法具足如水注器欲命受持是涅槃經文殊奉旨召阿難歸佛言有梵志須跋陀羅年百二十未捨憍慢汝可告之如來中夜當般涅槃即與同至聞佛說法得阿羅漢乃告大眾自我得道度憍陳如最後度須跋陀羅吾事究竟二月十五日中夜復伸告誡汝等比丘於我滅後當尊波羅提木叉是汝大師如我住世無異也於七寶床右脇而臥寂然無聲便般涅槃阿那律升忉利天告摩耶夫人自天而下世尊起為說法開慰復語阿難當知為後世不孝眾生故從金棺出問訊於母時迦葉與五百弟子自耆闍崛山奔至悲哽作禮復現雙足千輻輪相天人各持香薪至茶毘所化火自焚七日乃盡眾收舍利滿八金壜阿闍世王與八國王及帝釋諸天龍王共爭舍利大臣優波吉諫止宜共分之即分為三一諸天一龍王一分八王而闍王得八萬四千數以紫金函盛於五恒河中作塔藏之帝師涅槃至日法座上敬安牌位如法鋪設嚴備香花燈燭茶果珍羞供養維那請製疏僉疏佛涅槃同隔宿命堂司行者報眾掛諷經牌正日鳴鐘集眾向座雁立候住持至上香上湯上食下䞋上茶禮拜畢拈香有法語維那揖班上香大眾普同禮拜住持跪爐宣疏舉呪回向云上來諷經功德奉為皇天之下一人之上開教宣文輔治大聖至德普覺真智佑國如意大寶法王西天佛子大元帝師上酬慈廕十方三世一切諸佛云云疏語天啟有元篤生輔治之大聖道尊無上實為宣文之法王密贊化基陰翊王度吐辭為經舉足為法位居千佛之中博厚配地高明配天尊極一人之上維茲聖忌益仰恩光伏願重駕願輪贊四海同文之治化眷言像季振千古正法之宗綱帝師拔合斯八法號惠幢賢吉祥土波國人也己亥歲四月十三日降生父曰唆南紺藏初土波有國師禪恒羅吉達得正知見具大威神累葉相傳道行殊勝其國王世師尊之凡十七代而至薩斯加哇即師之伯父也師天資素高復禮伯父為師祕密伽陀微妙章句一二千言過目成誦七歲演法辯博縱橫年十有五歲在癸丑世祖皇帝龍德淵潛師灼知真命有歸馳騎徑詣王府上與中闈東宮皆秉受戒法特加尊禮閱六載庚申世祖聿登大寶建元中統遂尊為國師授以玉印任中原法主統領天下釋教始令僧俗分司四年辭帝西歸未朞月趣召來還至元七年庚午有旨制大元國字師獨運摹畫不日而成深愜聖意即詔頒行朝省郡縣悉皆遵用迄為一代典章升號帝師大寶法王更賜玉印旋又西歸十一年上復專使召至尋又力辭還山上堅留之不可十七年十一月二十二日入滅上聞不勝震悼追懷連建大窣堵波于京師寶藏真身舍利輪奐金碧古今無儔見翰林學士王磐等奉勅所撰碑後升號皇天之下一人之上開教宣文輔治大聖至德普覺真智佑國如意大寶法王西天佛子大元帝師報本章終尊祖章第四人各祀其祖重其形生之始也形生始於愛然形有時而化愛有時而盡惟性之靈然不昧者不恃生而存不偕亡而亡故佛教人必明性而後之學者復膠於文言不得其指歸猶醫之善方書而廢藥石何益哉及吾祖達磨至示以直指之道而人始廓然見夫自性之妙不求文字不資語默而得於謦欬聲色之外則吾徒之傳祖道嗣祖位者如火之薪水之器無古今之間毫髮之異不猶重於形生之始乎後百丈大智禪師又作清規以居吾徒而禪林於是乎始海會端公謂宜祀達磨於中百丈陪于右而各寺之開山祖配焉見於祖堂綱紀序云達磨忌先期堂司率眾財營供養請製疏僉疏佛涅槃同隔宿如法鋪設法堂座上掛真中間嚴設祭筵爐瓶香凡上間設禪椅拂子椸架法衣設床榻者非也下間設椅子經案爐瓶香燭經卷堂司行者報眾掛諷經牌當晚諷經并覆來日半齋各具威儀散忌諷經參前鳴僧堂鐘集眾候住持至鳴鼓獻特為湯住持上香三拜不收坐具上湯退身三拜再進前問訊揖湯復位二拜收坐具鳴鼓三下行者鳴手磬維那出班念誦云切以宗傳直指忝借潤於餘波道大難名愧聯輝於末裔仰憑大眾念清淨法身毘盧遮那佛十號云云回向云上來念誦功德奉為初祖菩提達磨圓覺大師大和尚上酬慈廕十方三世一切云畢鳴僧堂鐘三下眾散或請就坐藥石昏鐘鳴再鳴僧堂鐘集眾住持上香維那舉楞嚴呪畢回向云淨法界身本無出沒大悲願力示有去來仰冀慈悲俯垂昭鑒今月初五日伏值初祖菩提達磨圓覺大師大和尚示寂之辰率比丘眾營備香饌以伸供養諷誦大佛頂萬行首楞嚴神呪所集殊勳上酬慈廕伏願群機有賴播揚少室之家風妙智無窮成就大乘之根器十方三世一切云云次參頭領眾行者排列喝參禮拜諷經人僕排列參拜次日早住持上香禮拜上湯上粥座下側坐陪食粥罷住持上香上茶維那舉大悲呪畢回向上來諷經功德奉為初祖菩提達磨圓覺大師大和尚上酬慈廕十方三世云云半齋鳴僧堂鐘集眾向祖排立住持上香三拜不收坐具進爐前上湯上食請客侍者供遞俟燒香侍者就祖位側捧置几上退就位三拜仍進前燒香下䞋畢三拜收坐具鳴鼓講特為茶如湯禮畢住持拈香有法語行者鳴鈸維那出班揖住持上香侍者捧香合次東堂西堂兩序出班上香大眾同展三拜維那白云淨法界身本無出沒大悲願力示有去來宣疏住持跪爐次舉楞嚴呪畢回向上來諷經功德奉為初祖菩提達磨圓覺大師大和尚上酬慈廕十方三世云云次行者諷經疏語大哉正傳紹覺皇之宗裔廓然無聖破義學之膏肓百川到海逈絕異流杲日麗天罄無側影指人心而成佛成佛同心契妙道以忘言忘言見道有大功於世教宜廣振於宗風現濁世優曇華實為鼻祖取神州大乘器盡入彀中適逢瘞履之辰爰效采蘩之薦伏願信衣表佛祖之重力任千鈞一花開天地之春芳聯萬世祖師南天竺國香至王第三子也姓剎帝利本名菩提多羅後遇二十七祖般若多羅尊者知師密跡因試令與二兄辯所施寶珠發明心要既而尊者謂曰汝於諸法已得通量夫達磨者通大之義也宜名達磨因改名菩提達磨師乃告尊者曰我既得法當往何國而作佛事願垂開示尊者曰汝雖得法未可遠遊且止南天待吾滅後六十七載當往震旦設大法藥直接上根慎勿速行衰於日下梁普通八年丁未歲九月二十一日至南海廣州刺史蕭昂表聞武帝帝遣使詔迎十月一日至金陵與帝語不契是月十九日渡江北十一月二十三日屆于洛陽當魏孝明太和十年也萬止于嵩山少林寺面壁而坐終日默然人莫之測謂之壁觀婆羅門至太和十九年丙辰歲十月五日端居而逝其年十二月二十八日葬熊耳山起塔於定林寺唐諡圓覺大師塔曰空觀百丈忌先期堂司率眾財營供養至日隔宿如法鋪設法堂座上掛真嚴設中間祭筵上下間几案供具當晚諷經正日散忌特為茶湯拈香宣疏出班上香大眾展拜並同達磨忌禮但無念誦初夜回向云淨法界身本無出沒大悲願力示有去來仰冀慈悲俯垂昭鑒正月十七日伏值百丈大智覺照弘宗妙行禪師大和尚示寂之辰率比丘眾營備香羞以伸供養諷誦大佛頂萬行首楞嚴神呪所集殊勳上酬慈廕伏願曇花再現重開覺花之春惠日長明永燭昏衢之夜十方三世一切云云疏語一言為天下法中矩中規萬世知師道尊有綱有紀以儗叢林禮樂之盛見法筵龍象之多華梵同文富擬名渠天祿經律相濟嚴如金科玉條有布武堂上之儀非綿蕞野外之禮即此用離此用語脫重玄出於機入於機理窮眾妙宜配禪祖以陪祀盍遵諱日而營齋伏願帝釋精進勝幢制諸魔外濟北陰涼大樹蔭滿閻浮師福州長樂人王氏子丱歲離塵三學該練屬馬祖闡化江西法席之盛若大珠南泉歸宗號法龍象而師為上首暨祖示寂泐潭師繼之以眾委湊無所容欲辭去道過新吳憩止車輪峯下有甘貞游暢願施地延居已而眾復至遂建寺為大拓提焉元和九年正月十七日師歸寂彬林不爇而燎靈溪方春而涸四眾悲慘葬于大雄峯先是有異人司馬頭陀者為擇葬地曰傍連三峯未窮其妙法王居之天下師表而世以為信然云唐長慶元年勅諡大智禪師塔曰大寶勝輪宋大觀元年加諡覺照塔曰慧聚大元元統三年加諡弘宗妙行禪師開山歷代祖忌開山忌及道行崇重功被山門者隔宿鋪設法堂上禮儀百文或無疏庫司備供養若歷代忌不具疏不獻特為茶湯屆期堂司預報庫司備供養請牌位就法座西首鋪設粥罷集眾住持兩序一行排立維那出揖班上香畢歸位同展三拜侍者班尾拜至大規云有處就祖堂下食一位諷經非禮也舉大悲呪回向云寶明空海湛死生漩箥之波大寂定門融今古去來之相仰冀貞慈俯垂昭鑒山門今月某日伏值前生當山第幾代某號某禪師示寂之辰營備珍羞以伸供養比丘眾諷誦大悲神呪所集殊勳增崇品位伏願慧日重輝耀祖室光明之種靈根再蘗回少林花木之春云云或鄉人或江湖舉呪回向云上來諷經功德奉為某號大和尚增崇品位十方三世云云或有俵䞋則舉楞嚴呪回向同前嗣法師忌先德唯激揚宗乘發明自己開示後學知有授受以報恩也如巴陵三轉語為雲門作忌先輩深有意焉然尊師重道禮不可廢先期住持出己財送庫司辦祭設供隔宿就法堂如法排辦堂司行者報眾掛諷經牌當晚諷楞嚴呪鄉人法眷舉大悲呪次行者諷經回向並同次早住持上粥粥罷大眾諷大悲呪鄉人法眷舉呪半齋散忌諷經住持上食講特為茶拈香達磨忌同兩序上香大眾同拜蓋上座下皆曰參學故也齋時住持入堂燒香展拜歸位衣鉢侍者行䞋有就法堂諷經時俵䞋非禮也齋畢就座點茶燒香侍者行禮若講特為伴真湯齋罷方丈客頭請西堂兩序晚間對真相伴喫湯排照牌位列座右住持揖就座燒香上湯并下相伴人湯退身燒香展拜起身問訊謝相伴鳴鼓三下退座如有三五人西堂則分作兩座第一座西堂喫湯住持行禮第二座兩序喫湯侍者行禮或無西堂則已之諷經罷備湯果預請兩序勤舊如有法眷尊長同門兄弟皆當請之小師師孫不可同席坐定住持起上香上湯畢侍者燒香行湯果尊祖章終住持章第五佛教入中國四百年而達磨至又八傳而至百丈唯以道相授受或岩居穴處或寄律寺未有住持之名百丈以禪宗寖盛上而君相王公下而儒老百氏皆嚮風問道有徒實蕃非崇其位則師法不嚴始奉其師為住持而尊之曰長老如天竺之稱舍利弗須菩提以齒德俱尊也作廣堂以居其眾設兩序以分其職而制度粲然矣至於作務猶與眾均其勞常曰一日不作一日不食烏有庾廩之富輿僕之安哉故始由眾所推既而命之官而猶辭聘不赴者後則貴鬻豪奪視若奇貨然苟非其人一寺廢蕩又遺黨於後至數十年蔓不可圖而往往傳其冥報之慘有不忍聞者可不戒且懼乎住持日用上堂凡旦望侍者隔宿稟住持云來晨祝聖上堂次早再稟分付客頭行者掛上堂牌報眾粥罷不鳴下堂鐘三下俟鋪法座畢堂司行者覆首座鳴眾寮前板大眾坐堂方丈行者覆住持次覆侍者鳴鼓兩序領僧行至座前問訊分班對立侍者請住持出登座拈香祝壽詳具祝釐章趺坐開發學者激揚此道若有客併敘序謝多則具目子恐有遺忘侍者提起或有諸山住持名德西堂座右設位官客對座設位知禮尊法則不坐也五參上堂兩序至座下徑歸班立住持登座不拈香餘如前式若尊宿相訪特為上堂或引座舉揚施主請陞座不拘時也古之學者蓋為決疑故有問答初不滯於語言近日號名禪客多昧因果增長惡習以為戲劇譁然喧笑甚失觀瞻況舉揚宗乘端祝聖壽若有官客及名德相過少致敘陳而今時衲子例責過褒敘謝殊乖法式如說山門事務則方丈會茶議論毋談雜事使眾厭聽晚參凡集眾開示皆謂之參古人匡徒使之朝夕咨扣無時而不激揚此道故每晚必參則在晡時至今叢林坐參猶旦望五參陞座將聽法時大眾坐堂也詳具祝釐章若住持至晚不參則堂司行者稟命住持覆首座鳴僧堂鐘三下謂放參鐘也如住持入院或官員檀越入山或受人特請或謂亡者開示或四節臘則移於昏鐘鳴而謂之小參可以敘世禮曰家教者是也然亦不鳴放參鐘謂猶有參也小參小參初無定所看眾多少或就寢堂或就法堂至日午後侍者覆住持云今晚小參令客頭行者報眾掛小參牌當晚不鳴放參鐘昏鐘鳴時行者覆住持鳴鼓一通眾集兩序歸位住持登座與五參上堂同提綱敘謝委曲詳盡然後舉古結座如四節說請頭首秉拂及講免禮儀詳略使眾通知下座客頭行者喝請云方丈和尚請西堂兩班單寮耆舊蒙堂侍者禪客即今就寢堂獻湯庫司預備湯果送上方丈昔汾陽昭禪師住汾州太子院以并汾地苦寒故罷夜參有異比丘振錫而至謂師曰會中有大士六人奈何不說法言訖昇空而去師密記以偈曰胡僧金錫光為法到汾陽六人成大器勸請為敷揚時楚圓守芝號上首楚圓即慈明也後住石霜飯罷常山行時楊岐會公為監寺闞其出撾鼓集眾慈明遽還怒數曰暮而升座何從得此規繩會徐對曰汾州晚參何為非規繩乎慈明頷之告香每夏前告香新歸堂者推參頭一人維那和會定同眾詣侍司稟云新掛搭兄弟欲求和尚告香普說敢煩侍者咨稟答云容為後覆却當相報如住持允從即報堂司出告香圖式見後量眾多少列作幾行分東西兩邊面向法座而立依戒排列預集眾習儀堂司行者率眾錢買香大小三片及紙作圖之費付參頭收至日侍者令客頭於寢堂或法堂鋪設罘罳椅子須用香几三隻燭臺三對當椅前字間列外設小拜席堂司行者預逐一報眾掛告香牌侍者預出小榜貼法堂柱上云奉堂頭和尚慈旨名德西堂首座並免告香侍司某謹白至日粥罷諸寮各鳴板三下眾集依圖位立各備小香合坐具參頭同維那侍者入請住持出參頭歸位同眾問訊進前云請和尚趺坐住持就座副參遞大香一片與參頭同眾問訊插香各大展三拜收坐具復同問訊參頭進椅側問訊稟云某等為生死事大無常迅速伏望和尚慈悲開示因緣住持舉話三則隨下語歸位問訊插香一片復同眾就位叉手而立東西各三人出班東第一第二人過東爐前第三人中爐前西第一第二人過西爐前第三人過中爐前前兩兩炷香問訊然後東三人過東西三人過西以次如前而進徐步行各巡接班尾三三叉手出班合掌歸位俟各炷香畢次第趲至元位同眾三拜不收坐具參頭進云某等蒙和尚慈悲開允下情不勝感激之至復位同眾三拜進云即日時令謹時共惟堂頭和尚尊候起居萬福復位同眾三拜收坐具行者鳴鼓五下兩序轉身序立座前參頭立西序下其告香人東西轉身依位對立勤舊蒙堂已告香者立于後普說竟仍齊向法座立參頭插香同眾三拜免則觸禮進云某等宿生慶幸獲蒙和尚慈悲開示下情不勝感激之至普同問訊而退參頭領眾法堂下間謝維那侍者觸禮一拜次大眾謝參頭觸禮一拜請客侍者預依戒次具茶狀備卓袱筆硯告香罷列法堂下間請茶各僉名請首座光伴齋退鳴鼓眾歸位立兩侍者行禮與常特為茶同當晚方丈請參頭維那侍者藥石首座光伴次早請參頭茶半齋請參頭維那侍者點心若大眾均預告香則首座為參頭其特為茶請西堂光伴住持入院後人事定庫司備香首座領眾懇請為眾告香然後開堂古法未預告香不許入室普說有大眾告香而請者就據所設位坐有檀越特請者有住持為眾開示者則登法座凡普說時侍者令客頭行者掛普說牌報眾鋪設寢堂或法堂粥罷行者覆住持緩擊鼓五下侍者出候眾集請住持出據坐普說與小參禮同入室入室者乃師家勘辦學子策其未至擣其虛亢攻其偏重如烹金爐鉛汞不存玉人治玉碔砆盡廢不拘昏曉不擇處所無時而行之故昔時衲子小香合常隨身但聞三下鼓鳴即趨入室今時以三八入室者備故事也遇開室時粥前侍者令客頭行者僧堂前諸寮掛入室牌寢堂設達磨像前列香燭拜席敷設室內秉燭裝香拜席設左側粥罷下堂客頭即緩擊鼓三下住持至達磨前炷香同侍者三拜入據室坐侍者問訊班左立行者問訊班右立頭首領眾達磨前各炷香三拜聯接而至室前後至者依次炷香展拜接排而立次第相趲不許攙先亂序侍者燒香問訊出外揖首座入入先左足仍以左手上香進前問訊至禪椅右側立聽舉話或下語或不下語隨意過禪椅左問訊退步觸禮一拜舉左足出揖次人入一出一入相向問訊聯接不絕若首座是大方西堂或名德入燒香住持當下座揖讓送出遇陞堂白眾特免此亦近代循襲之儀若古德當機佛祖不讓寧講世禮顧師家何如耳只後堂領眾暫到皆當入室侍者居眾後入室畢炷香大展三拜行者插香三拜住持復出達磨前炷香大展三拜而退念誦古規初三十三二十三初八十八二十八今止行初八十八二十八堂司依戒次寫圖式見後至日僧堂前灑掃午後堂司行者報眾掛念誦牌至參前檢點僧堂及諸殿堂香燭完備覆住持兩序先鳴方丈板照堂板次巡廊鳴板住持出緩鳴大板三下眾集依圖立定暫到於侍者下肩立侍者隨住持到祖堂土地堂大殿燒香禮拜鳴大鐘兩序預集堂外大板鳴方歸圖位住持入堂供頭鳴堂前鐘七下聖僧前燒香侍者捧香合書狀侍者徑歸位請客侍者即往西序問訊請湯巡過次請東序就歸位住持出堂外中立燒香侍者隨出歸位維那先離位至門首向住持立合掌念誦上八中八云皇風永扇帝道遐昌佛日增輝法輪常轉伽藍土地護法護人十方檀那增福增慧為如上緣念清淨法身毘盧遮那佛云云大眾默念每一號堂前輕應鐘一聲念畢疊一聲下八云白大眾如來大師入般涅槃至今大元重紀至元元年已得二千二百八十四載是日已過命亦隨減如少水魚斯有何樂眾等當勤精進如救頭然但念無常慎勿放逸伽藍土地護法護人十方檀那增福增慧為如上緣念清淨法身十號云云畢歸位住持入堂前堂首座入次名德西堂插入歸聖僧板頭立頭首領眾三人一引聖僧前問訊轉身住持前問訊合掌巡堂順左肩轉依圖位立暫到侍者隨眾入只巡半堂至聖僧後侍者向後門立暫到向侍者立次知事入堂聖僧前問訊轉身住持前問訊合掌巡堂出暫到接侍者後隨出堂司行者往首座前覆云放參從聖僧後轉出堂供頭鳴堂前鐘三下眾普同和南各出全單而散住持出兩序隨出至堂前謝湯住持止之下八赴湯寢堂鳴板侍者燒香行禮如常式湯罷藥石古法三八皆有湯上八中八則免藥石其日不坐參至晚坐禪如常式巡寮古規住持巡寮僧堂前掛巡寮牌報眾各寮設位備香茶湯伺候住持至鳴板集眾於門外排立問訊隨住持入寮寮主燒香同眾問訊而坐住持詢問老病點檢寮舍缺之敘話而起眾當展坐具謝臨訪免則問訊相送或旦望巡行則不掛牌今惟以四節報禮為巡寮餘日不講能復古者當行之僧祇云世尊以五事故五日一按行僧房一恐弟子著有為事二恐著俗論三恐著睡眠四為看病僧五令年少比丘觀佛威儀生歡喜故肅眾大藏經內載宋翰林學士楊億推原百丈立規之意略曰有或假號竊邢混于清眾別致喧撓之事即當維那撿舉抽下本位掛搭擯令出院者貴安清眾也或彼有所犯即以拄杖杖之集眾燒衣鉢道具遣逐偏門而出者示耻辱也詳此一條制有四益一不污清眾生恭敬故二不毀僧形循佛制故三不擾公門省獄訟故四不泄於外護宗綱故然百丈創規折衷佛律五篇七聚弘範三界梵檀擯治自恣舉過以肅其眾國朝累聖戒飭僧徒嚴遵佛制除刑名重罪例屬有司外若僧人自相干犯當以清規律之若鬪諍犯分若污行縱逸若侵漁常住若私竊錢物宜從家訓母揚外醜蓋悉稱釋氏准俗同親恪守祖規隨事懲戒重則集眾箠擯輕則罰錢罰香罰油而榜示之如關係錢物則責狀追陪惟平惟允使自悔艾古規繩頌云盜財并鬪諍酒色污僧倫速遣離清眾容留即敗群又云犯重焚衣鉢應當集眾人山藤聊示恥驅擯出偏門大惠禪師住育王時榜示堂司僧爭無明決非好僧有理無理並皆出院或議有理而亦擯疑若未當蓋僧當忍辱若執有理而爭者即是無明故同擯之息諍於未萌也訓童行凡旦望五參上堂罷參頭行者令喝食行者報各局務行堂前掛牌報眾昏鐘鳴行堂前鳴板三下集眾行者先佛殿次祖堂僧堂前前堂寮喝參方上寢堂排立參頭入方丈請住持出就坐參頭進前插香退身歸位緩聲喝云參眾低聲同云不審齊禮三拜屏息拱聽規誨畢又三拜參頭喝云珍重眾齊低聲和問訊而退如住持他緣則喝食行者喝云奉方丈慈旨晚參眾云不審次長聲喝云放參眾云珍重齊問訊退為行者普說參頭預詣侍司插香禮拜稟侍者咨覆住持如允所請參頭即鳴行堂前板集眾排立寢堂參頭隨侍者入請住持出據坐參頭同眾問訊進前插香退身歸位緩聲喝云不審眾低聲和畢同禮九拜參頭進云某等久思和尚示許伏望慈悲開示因緣轉身問訊而退次日行堂掛普說牌報眾設座香几燭臺參頭報眾請兩序立班副參領眾門迎兩序入堂參頭堂主詣侍司同請住持下行堂眾迎入據坐侍者問訊側立兩序問訊畢侍者燒香請法參頭領眾雁立插香喝參三拜退分東西序後雁立拱聽開示畢參頭領眾如前排立三拜即出門外右立揖送住持兩序然後隨至寢堂插大香一片九拜而退次詣侍司插香三拜參頭副參同住兩序前一一拜謝受法衣專使送法衣至先相看知客通意同上侍司煩通覆方丈或即相接或在來早侍者預令客頭報請兩序至專使插香如常禮相看謝茶畢再插香兩展三禮免則觸禮詞云某人和尚法衣表信專此奉上以柈袱托呈法衣信物然後入座兩序光伴茶罷獻湯湯罷兩序同送安下侍者引巡寮別日上堂法座左邊設住持位專使大展三拜捧衣遞上住持接衣有法語披衣陞座或嗣法師已遷化法堂右間設靈几下座致祭諷經如遺書至之禮見後迎侍尊宿尊宿相訪須預掛接尊宿牌鳴鐘集眾門迎彼若尚簡則潛入寺住持必於寢堂具香燭相接仍令鳴僧堂鐘客頭報首座領眾插香問訊畢眾退兩序勤舊就陪坐燒香喫茶罷侍者方插香禮拜帶行侍者行者人僕轎從參拜方丈執局及參頭領眾行者人僕轎番以次參拜侍者復燒香點湯湯罷兩序勤舊同送客位客頭令備轎住持同引巡寮報禮侍者隨侍若以下諸山則侍者引巡寮請客侍者具狀詣客位插香拜請特為湯稟云方丈拜請和尚今晚就寢堂特為獻湯伏望慈悲降重稟訖呈狀式見後畢客頭覆云請和尚湯罷就座藥石寢堂釘掛帳幕排照牌設特為光伴位鳴鼓行禮揖坐揖香勸湯湯罷藥石並同常特為禮客頭詣客位請云方丈請和尚今晚湯果仍請兩序光伴侍者覆來早上堂致謝次早請湯侍者燒香行者問訊僕從聲喏住持相陪喫粥粥罷請茶侍者再稟上堂座右設位半齋點心如大尊宿則首座眾頭首稟住持勸請為眾開示法要住持先到客位陳意若允首座具狀兩序大眾同詣客位插香拜請次請住持引座報眾掛牌法座前左右排立至時鳴鼓住持同下法堂位前立住持先引座與常上堂同下座兩序詣尊宿前問訊尊宿往住持前問訊歸中普問訊登座侍者兩序出班問訊住持問訊說法畢下座住持前問訊普與大眾問訊住持兩序大眾隨詣客位插香拜謝請客侍者具狀請特為管待山門置食備䞋方丈備貼䞋行禮與常特為同若諸山平交斟酌中禮可也若法眷尊長至先講諸山相見禮送客位請居中座住持插香禮拜講法眷禮方丈內坐當讓中位迎送如前禮獻湯躬行禮客力辭侍者行禮若嗣法辦事法妷相訪當躬至方丈住持即今鳴僧堂鐘集眾人事先請住持中坐行弟子法眷禮次講諸山禮接送同前但特為湯管待不具狀請客侍者炷香陳請又看年臘高低臨時通變請湯請管侍請陞座各有狀式見後當寺住持比丘某右某輒以今晚就寢堂點湯特為伏望尊慈特垂降重謹狀年月日具位狀當寺住持比丘某右某輒以來日就寢堂聊備水飯伏望尊慈特垂降重謹狀年月日具位狀當寺首座比丘某右某輒以來日拜請舉揚宗旨開示後學伏望尊慈俯垂開允謹狀年月日具位狀可漏子狀請某處堂頭和尚禪師具位謹封施主請陞座齋僧施主到門知容接見引上方丈獻茶湯送安下處若官貴大施主當鳴鐘集眾門迎送安下處定施主却請知事商議同上方丈炷香拜請陞座至日鋪設法座座前設施主位掛上堂牌報眾鳴鼓集眾知客同施主上方丈請住持須備手爐燈幡鐃鈸如儀迎至座前登座趺座施主座前設拜知客揖引入位聽法但受禮坐則慢法也下座拜謝若齋僧須與知事議定齋料用費維那具僧行數目䞋資隨數均俵僧堂內設施主位與住持分手齋畢知事陪施主僧堂前少立待首座領眾出堂致謝次住持知事到客位謝或有寄錢齋僧住持責付知事須當盡數營辦供䞋慎勿互用當思因果歷然人天寶鑑云湖南雲蓋山智禪師夜坐丈室忽聞焦灼氣枷鎖聲即而視之迺有荷火枷者火猶起滅不停枷尾倚於門閫智驚問曰汝為誰苦至斯極耶荷枷者對曰前住當山守顒也不合互將檀越供僧物造僧堂故受此苦智曰作何方便可免顒曰望為估直僧堂填設僧供可免爾智以己貲如其言為償之一夕夢顒謝曰賴師力獲免地獄苦生人天中三生後復得為僧今門閫燒痕猶存然顒公以供僧物作僧堂皆僧受用尚受互用之報若此今叢林撥無因果非唯互用甚至竊常住為己有者宜何如哉受嗣法人煎點若法嗣到寺煎點令帶行知事到庫司會計營辦合用錢物送納隔宿先到侍司咨稟通覆詣方丈插香展拜免則觸禮請云來晨就雲堂聊具菲供伏望慈悲特垂降重令客頭請兩序單寮諸寮掛煎點牌至日僧堂住持位嚴設敷陳及卓袱襯幣之具火板鳴大眾赴堂煎點人隨住持入堂揖坐轉身聖僧前燒香叉手往住持前問訊轉聖僧後出住持引手揖煎點人坐位居知客板頭行者喝云請大眾下鉢行食遍煎點人起燒香下䞋問訊住持及行眾䞋厨司方鳴齋板就行飯飯訖眾收鉢退住持卓煎點人燒香往住持前問訊從聖僧後出爐前問訊鳴鐘行茶遍往住持前勸茶復從聖僧後出進住持前展坐具云此日薄禮屑瀆特辱附重下情不勝感激之至二展寒溫觸禮三拜送住持出煎點人復歸堂燒香上下間問訊以謝光伴復中問訊鳴鐘收盞次詣方丈謝降重住持隨到客位致謝若諸山煎點候齋辦請住持同赴堂揖住持坐住持當免行禮揖煎點人歸位持行食遍起燒香往住持前問訊下䞋俵眾人䞋燒火伴香歸位伴食茶禮講否隨宜斟酌嗣法師遺書至專使持書到寺禮儀詳見下遺書篇方丈開書兩序先慰住持法堂中間設祭座前拈香有法語舉哀三拜上湯復三拜進食下䞋鳴鼓講特為禮三拜上茶鳴鼓三下退座收坐具維那舉楞嚴呪回向與嗣法師忌同兩序四寮江湖鄉人法眷小師辦事皆有祭住持居靈几之左如有諸山及座下西堂法眷與師為行輩者上祭則住持同專使答拜以下則不答拜祭畢諷大悲呪回向云上來諷經功德奉為某寺某號大和尚增崇品位十方三世一切佛云云首座領眾慰住持云法門不幸令師和尚遷化後學失依不勝悲悼尚冀堪忍力行此道
